<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="TreinoLog" />
    <meta name="theme-color" content="#0a0a0c" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <title>TreinoLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      :root {
        --bg: #0a0a0c;
        --surface: #161618;
        --surface2: #1e1e21;
        --border: #28282c;
        --accent: #a78bfa;
        --accent2: #7c3aed;
        --text: #f0f0f0;
        --text2: #8a8a92;
        --text3: #46464d;
        --green: #4ade80;
        --red: #f87171;
        --orange: #fb923c;
        --yellow: #facc15;
        --radius: 16px;
        --safe-top: max(env(safe-area-inset-top, 0px), 44px);
        --safe-bot: max(env(safe-area-inset-bottom, 0px), 10px);
      }
      html[data-theme="light"] {
        --bg: #f4f3f8;
        --surface: #ffffff;
        --surface2: #eceaf3;
        --border: #dcd9e6;
        --accent: #7c3aed;
        --accent2: #6d28d9;
        --text: #1a1a22;
        --text2: #6b6b78;
        --text3: #a7a7b4;
        --green: #16a34a;
        --red: #dc2626;
        --orange: #ea580c;
        --yellow: #ca8a04;
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        overscroll-behavior: none;
        transition:
          background 0.3s,
          color 0.3s;
      }
      body {
        display: flex;
        flex-direction: column;
        max-width: 430px;
        margin: 0 auto;
      }
      #auth-screen {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 1400;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 32px calc(40px + var(--safe-bot));
        overflow-y: auto;
      }
      .auth-logo {
        font-family: "DM Serif Display", serif;
        font-size: 38px;
        margin-bottom: 6px;
        text-align: center;
      }
      .auth-logo span {
        color: var(--accent);
      }
      .auth-tagline {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 36px;
        text-align: center;
      }
      .auth-tabs {
        display: flex;
        gap: 0;
        background: var(--surface2);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: 24px;
        width: 100%;
      }
      .auth-tab {
        flex: 1;
        padding: 10px;
        border-radius: 9px;
        border: none;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        background: transparent;
        color: var(--text2);
        transition: all 0.2s;
      }
      .auth-tab.active {
        background: var(--surface);
        color: var(--text);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }
      .auth-input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        outline: none;
        margin-bottom: 12px;
        -webkit-appearance: none;
      }
      .auth-input:focus {
        border-color: var(--accent);
      }
      .auth-btn {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: none;
        background: var(--accent);
        color: var(--bg);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 4px;
        margin-bottom: 12px;
      }
      .auth-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .auth-error {
        font-size: 13px;
        color: var(--red);
        text-align: center;
        min-height: 18px;
        margin-bottom: 8px;
      }
      .auth-trial-box {
        background: color-mix(in srgb, var(--accent) 8%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 13px;
        color: var(--accent);
        line-height: 1.6;
        margin-bottom: 20px;
        text-align: center;
      }
      .auth-trial-box strong {
        display: block;
        font-size: 15px;
        margin-bottom: 4px;
      }
      .status-badge {
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 100px;
        font-weight: 600;
        white-space: nowrap;
      }
      .status-badge.pro {
        background: color-mix(in srgb, var(--accent) 14%, transparent);
        color: var(--accent);
        border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      }
      .status-badge.trial {
        background: color-mix(in srgb, var(--yellow) 14%, transparent);
        color: var(--yellow);
        border: 1px solid color-mix(in srgb, var(--yellow) 30%, transparent);
      }
      .status-badge.free {
        background: var(--surface2);
        color: var(--text3);
        border: 1px solid var(--border);
      }
      .trial-banner {
        background: color-mix(in srgb, var(--yellow) 8%, transparent);
        border: 1px solid color-mix(in srgb, var(--yellow) 25%, transparent);
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 13px;
        color: var(--yellow);
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .trial-banner svg {
        width: 16px;
        height: 16px;
        stroke: var(--yellow);
        flex-shrink: 0;
      }
      .paywall-hero {
        text-align: center;
        padding: 8px 0 20px;
      }
      .paywall-icon {
        font-size: 42px;
        margin-bottom: 10px;
      }
      .paywall-title {
        font-family: "DM Serif Display", serif;
        font-size: 22px;
        margin-bottom: 6px;
      }
      .paywall-sub {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.5;
      }
      .plan-cards {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 20px 0;
      }
      .plan-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        position: relative;
      }
      .plan-card.featured {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 6%, transparent);
      }
      .plan-tag {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--accent);
        color: var(--bg);
        font-size: 11px;
        font-weight: 700;
        padding: 3px 12px;
        border-radius: 100px;
        white-space: nowrap;
      }
      .plan-name {
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 3px;
      }
      .plan-price {
        font-size: 22px;
        font-weight: 700;
        color: var(--accent);
      }
      .plan-price span {
        font-size: 13px;
        font-weight: 400;
        color: var(--text2);
      }
      .plan-desc {
        font-size: 12px;
        color: var(--text3);
        margin-top: 4px;
      }
      .plan-btn {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: none;
        background: var(--accent);
        color: var(--bg);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
      }
      .plan-btn.secondary {
        background: var(--surface2);
        color: var(--text2);
      }
      .plan-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .paywall-note {
        font-size: 11px;
        color: var(--text3);
        text-align: center;
        margin-top: 12px;
        line-height: 1.6;
      }
      .pro-features-list {
        margin: 16px 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .pro-feature-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--text2);
      }
      .pro-feature-item::before {
        content: "✓";
        color: var(--accent);
        font-weight: 700;
        flex-shrink: 0;
      }
      .upsell-block {
        background: color-mix(in srgb, var(--accent) 6%, transparent);
        border: 1px dashed color-mix(in srgb, var(--accent) 35%, transparent);
        border-radius: 14px;
        padding: 20px 16px;
        text-align: center;
        margin: 10px 0;
      }
      .upsell-lock {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .upsell-title {
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 5px;
      }
      .upsell-sub {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 14px;
        line-height: 1.5;
      }
      .upsell-btn {
        display: inline-block;
        padding: 11px 24px;
        border-radius: 100px;
        border: none;
        background: var(--accent);
        color: var(--bg);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .export-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text2);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        margin-top: 8px;
        justify-content: center;
      }
      .export-btn svg {
        width: 16px;
        height: 16px;
        stroke: var(--accent);
      }
      #export-canvas-container {
        position: fixed;
        left: -9999px;
        top: 0;
        z-index: -1;
        width: 390px;
        background: var(--bg);
      }
      #app {
        display: none;
        flex-direction: column;
        height: 100vh;
      }
      .header {
        padding: calc(var(--safe-top) + 14px) 20px 12px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header-title {
        font-family: "DM Serif Display", serif;
        font-size: 19px;
      }
      .header-title span {
        color: var(--accent);
      }
      .header-actions {
        display: flex;
        gap: 8px;
      }
      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }
      .icon-btn svg {
        width: 16px;
        height: 16px;
        stroke: var(--text2);
      }
      .tabs {
        display: flex;
        gap: 4px;
        padding: 10px 20px 0;
        background: var(--bg);
        position: sticky;
        top: calc(var(--safe-top) + 64px);
        z-index: 99;
      }
      .tab {
        flex: 1;
        padding: 9px 0;
        border-radius: 100px;
        border: none;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        background: var(--surface);
        color: var(--text2);
        transition: all 0.2s;
      }
      .tab.active {
        background: var(--accent);
        color: var(--bg);
      }
      .content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 16px 20px calc(60px + var(--safe-bot));
      }
      .grupo-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 6px 14px;
        font-size: 12px;
        color: var(--text2);
        margin-bottom: 14px;
        cursor: pointer;
      }
      .grupo-badge strong {
        color: var(--accent);
      }
      .hero-card {
        background: linear-gradient(
          135deg,
          var(--surface) 0%,
          var(--surface2) 100%
        );
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 22px 20px;
        margin-bottom: 18px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }
      .hero-card::before {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          color-mix(in srgb, var(--accent) 18%, transparent) 0%,
          transparent 70%
        );
      }
      .hero-tag {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
        border-radius: 100px;
        padding: 3px 10px;
        margin-bottom: 10px;
        letter-spacing: 0.4px;
      }
      .hero-nome {
        font-family: "DM Serif Display", serif;
        font-size: 23px;
        line-height: 1.2;
        margin-bottom: 8px;
        position: relative;
      }
      .hero-meta {
        font-size: 12px;
        color: var(--text2);
        margin-bottom: 16px;
      }
      .hero-meta strong {
        color: var(--text);
      }
      .hero-btn {
        width: 100%;
        padding: 15px;
        border-radius: 14px;
        border: none;
        background: var(--accent);
        color: var(--bg);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        position: relative;
        transition: opacity 0.2s;
      }
      .hero-btn:active {
        opacity: 0.85;
      }
      .outros-title {
        font-size: 11px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .treino-mini {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
      }
      .treino-mini-nome {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 3px;
      }
      .treino-mini-meta {
        font-size: 11px;
        color: var(--text3);
      }
      .treino-mini-meta strong {
        color: var(--text2);
      }
      .continuar-banner {
        background: color-mix(in srgb, var(--accent) 8%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--accent);
      }
      .continuar-banner svg {
        width: 16px;
        height: 16px;
        stroke: var(--accent);
        flex-shrink: 0;
      }
      #sessao-screen {
        display: none;
        flex-direction: column;
        height: 100vh;
        background: var(--bg);
      }
      .sessao-header {
        padding: calc(var(--safe-top) + 12px) 16px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .sessao-back {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }
      .sessao-back svg {
        width: 16px;
        height: 16px;
        stroke: var(--text2);
      }
      .sessao-info {
        flex: 1;
        min-width: 0;
      }
      .sessao-nome {
        font-family: "DM Serif Display", serif;
        font-size: 16px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sessao-timer-top {
        font-size: 11px;
        color: var(--text3);
        font-variant-numeric: tabular-nums;
      }
      .sound-btn,
      .foco-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }
      .sound-btn svg {
        width: 15px;
        height: 15px;
        stroke: var(--accent);
      }
      .sound-btn.muted svg {
        stroke: var(--text3);
      }
      .foco-btn svg {
        width: 15px;
        height: 15px;
        stroke: var(--accent);
      }
      .sessao-content {
        flex: 1;
        overflow-y: auto;
        padding: 12px 20px calc(140px + var(--safe-bot));
        -webkit-overflow-scrolling: touch;
      }
      .ex-group-title {
        font-size: 11px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        font-weight: 600;
        margin: 14px 0 8px;
        padding-left: 2px;
      }
      .exercicio-swipe-wrap {
        position: relative;
        margin-bottom: 12px;
        border-radius: 14px;
        overflow: hidden;
      }
      .swipe-bg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        font-size: 14px;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.15s;
        border-radius: 14px;
      }
      .swipe-bg-left {
        background: color-mix(in srgb, var(--orange) 14%, transparent);
        color: var(--orange);
        justify-content: flex-end;
        padding-right: 24px;
      }
      .swipe-bg-right {
        background: color-mix(in srgb, var(--green) 14%, transparent);
        color: var(--green);
        justify-content: flex-start;
        padding-left: 24px;
      }
      .exercicio-swipe-wrap.show-left .swipe-bg-left {
        opacity: 1;
      }
      .exercicio-swipe-wrap.show-right .swipe-bg-right {
        opacity: 1;
      }
      .exercicio-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        transition: border-color 0.2s;
        position: relative;
        z-index: 1;
        cursor: pointer;
      }
      .exercicio-card.feito {
        border-color: color-mix(in srgb, var(--green) 35%, transparent);
      }
      .exercicio-card.pulei {
        border-color: color-mix(in srgb, var(--orange) 25%, transparent);
        opacity: 0.7;
      }
      .exercicio-card.atual {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .ex-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 10px;
      }
      .ex-name {
        font-weight: 600;
        font-size: 15px;
      }
      .ex-cat {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
      }
      .ex-status-btn {
        padding: 5px 12px;
        border-radius: 100px;
        border: 1px solid var(--border);
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        background: var(--surface2);
        color: var(--text2);
        white-space: nowrap;
      }
      .ex-status-btn.feito {
        background: color-mix(in srgb, var(--green) 14%, transparent);
        color: var(--green);
        border-color: color-mix(in srgb, var(--green) 35%, transparent);
      }
      .ex-status-btn.pulei {
        background: color-mix(in srgb, var(--orange) 14%, transparent);
        color: var(--orange);
        border-color: color-mix(in srgb, var(--orange) 35%, transparent);
      }
      .ex-details {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-bottom: 10px;
      }
      .ex-detail {
        background: var(--surface2);
        border-radius: 8px;
        padding: 8px;
        text-align: center;
      }
      .ex-detail-label {
        font-size: 10px;
        color: var(--text3);
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .ex-detail-val {
        font-size: 14px;
        font-weight: 600;
      }
      .ex-series-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .ex-series-label {
        font-size: 12px;
        color: var(--text2);

    <script>
      // ── CONFIG (sem hardcode — tudo vem do banco) ──────────────────
      const _ep = atob(
        "aHR0cHM6Ly9qamRtZ3luam5iYnh4Z3RjZGVybC5zdXBhYmFzZS5jbw==",
      );
      const _ak = atob(
        "c2JfcHVibGlzaGFibGVfOEVFYnJ6THVRY19ncGdqZU5BVXJFd19RRm1uWVZBYw==",
      );

      // Valores padrão enquanto config não carrega
      let CFG = {
        app_name: "TreinoLog",
        trial_days: "14",
        free_history_days: "7",
        free_cal_days: "7",
        free_max_grupos: "3",
      };
      let CATEGORIAS = []; // carregadas do banco por usuário

      // Aliases legíveis internamente
      const appName = () => CFG.app_name;
      const trialDays = () => parseInt(CFG.trial_days);
      const freeHistDays = () => parseInt(CFG.free_history_days);
      const freeCalDays = () => parseInt(CFG.free_cal_days);
      const freeMaxGrp = () => parseInt(CFG.free_max_grupos);

      const DOW = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
      const MESES = [
        "Janeiro",
        "Fevereiro",
        "Março",
        "Abril",
        "Maio",
        "Junho",
        "Julho",
        "Agosto",
        "Setembro",
        "Outubro",
        "Novembro",
        "Dezembro",
      ];

      // ── TEMA ──────────────────────────────────────────────────────
      function applyTheme(t) {
        document.documentElement.setAttribute("data-theme", t);
        try {
          localStorage.setItem("_tl_theme", t);
        } catch (e) {}
        const icon = document.getElementById("theme-icon");
        if (!icon) return;
        icon.innerHTML =
          t === "dark"
            ? '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>'
            : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      }
      function toggleTheme() {
        applyTheme(
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "light"
            : "dark",
        );
      }
      try {
        applyTheme(localStorage.getItem("_tl_theme") || "dark");
      } catch (e) {}

      // ── CLIENTE DE DADOS (genérico — sem mencionar provider) ───────
      let _session = null; // { access_token, user }

      async function _req(path, opts = {}, useSession = true) {
        const headers = {
          apikey: _ak,
          "Content-Type": "application/json",
          Prefer: "return=representation",
          Authorization: `Bearer ${useSession && _session ? _session.access_token : _ak}`,
          ...(opts.headers || {}),
        };
        const res = await fetch(`${_ep}/rest/v1/${path}`, { ...opts, headers });
        if (!res.ok) {
          const e = await res.text();
          throw new Error(e);
        }
        const t = await res.text();
        return t ? JSON.parse(t) : null;
      }

      async function _authReq(path, body) {
        const res = await fetch(`${_ep}/auth/v1/${path}`, {
          method: "POST",
          headers: { apikey: _ak, "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok)
          throw new Error(data.error_description || data.msg || "Erro");
        return data;
      }

      // ── CONFIG DO BANCO ────────────────────────────────────────────
      async function loadConfig() {
        try {
          const rows = await _req("app_config?select=chave,valor", {}, false);
          if (rows)
            rows.forEach((r) => {
              CFG[r.chave] = r.valor;
            });
          applyAppName();
        } catch (e) {
          /* usa defaults */
        }
      }

      function applyAppName() {
        const name = appName();
        const parts = name.match(/^(.+?)(Log|Pro|Fit|App)?$/i);
        const base = parts?.[1] || name;
        const suffix = parts?.[2] || "";
        const html = suffix ? `${base}<span>${suffix}</span>` : name;
        const el1 = document.getElementById("auth-app-name");
        const el2 = document.getElementById("header-app-name");
        const tit = document.getElementById("tutorial-title");
        if (el1) el1.innerHTML = html;
        if (el2) el2.innerHTML = html;
        if (tit) tit.textContent = `Como usar o ${name}`;
        document.title = name;
      }

      // ── CATEGORIAS DO BANCO ────────────────────────────────────────
      async function loadCategorias() {
        try {
          const rows = await _req("treinos_categorias?order=posicao.asc");
          CATEGORIAS = rows
            ? rows.map((r) => ({ id: r.id, nome: r.nome }))
            : [];
        } catch (e) {
          CATEGORIAS = [];
        }
      }

      // ── AUTH ───────────────────────────────────────────────────────
      let currentAuthTab = "login";
      function switchAuthTab(tab) {
        currentAuthTab = tab;
        document
          .getElementById("tab-login")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("tab-signup")
          .classList.toggle("active", tab === "signup");
        const trialBox = document.getElementById("auth-trial-box");
        trialBox.style.display = tab === "signup" ? "block" : "none";
        if (tab === "signup") {
          const msg = document.getElementById("auth-trial-msg");
          if (msg)
            msg.textContent = `🎉 ${trialDays()} dias de acesso completo, grátis`;
        }
        document.getElementById("auth-name-wrap").style.display =
          tab === "signup" ? "block" : "none";
        document.getElementById("auth-submit").textContent =
          tab === "login" ? "Entrar" : "Criar conta";
        document.getElementById("auth-switch-btn").textContent =
          tab === "login"
            ? "Não tem conta? Criar agora"
            : "Já tenho conta. Entrar";
        document.getElementById("auth-error").textContent = "";
      }

      async function submitAuth() {
        const email = document.getElementById("auth-email").value.trim();
        const password = document.getElementById("auth-password").value;
        const name = document.getElementById("auth-name").value.trim();
        const btn = document.getElementById("auth-submit");
        const errEl = document.getElementById("auth-error");
        if (!email || !password) {
          errEl.textContent = "Preencha e-mail e senha.";
          return;
        }
        if (password.length < 6) {
          errEl.textContent = "A senha precisa ter pelo menos 6 caracteres.";
          return;
        }

      async function loadSubscription() {
        if (!_session) return;

          const rows = await _req(

          _isPro = false;

      function computeIsPro(sub) {
        if (!sub) return false;
        const now = Date.now();
        if (sub.billing_cycle === "lifetime") return true;
        if (
          sub.subscription_status === "active" &&
          sub.current_period_end &&
          new Date(sub.current_period_end).getTime() > now
        )
          return true;
        if (
          sub.subscription_status === "trialing" &&
          sub.trial_ends_at &&
          new Date(sub.trial_ends_at).getTime() > now
        )
          return true;
        return false;
      }
      function computeTrialDaysLeft(sub) {
        if (!sub || sub.subscription_status !== "trialing") return 0;
        return Math.max(
          0,
          Math.ceil(
            (new Date(sub.trial_ends_at).getTime() - Date.now()) / 86400000,
          ),
        );

      async function carregarCargaHist(excluirSessaoId) {
        cargaHist = {};
        prAntes = {};
        try {
          const rows = await db.getCargaHistory();
          const fin = (rows || []).filter(
            (r) =>
              r.treinos_sessoes &&
              r.treinos_sessoes.finalizado_em &&
              r.sessao_id !== excluirSessaoId,
          );
          fin.sort(
            (a, b) =>
              new Date(b.treinos_sessoes.iniciado_em) -
              new Date(a.treinos_sessoes.iniciado_em),
          );
          fin.forEach((r) => {
            if (!cargaHist[r.exercicio_id]) cargaHist[r.exercicio_id] = [];
            if (cargaHist[r.exercicio_id].length < 3)
              cargaHist[r.exercicio_id].push({
                carga: parseFloat(r.carga_usada),
                data: r.treinos_sessoes.iniciado_em,
              });
            const c = parseFloat(r.carga_usada);
            if (!prAntes[r.exercicio_id] || c > prAntes[r.exercicio_id])
              prAntes[r.exercicio_id] = c;
          });
        } catch (e) {}
      }

      function abrirTelaSessao() {
        document.getElementById("sessao-nome").textContent =
          sessaoAtiva.treino_nome;
        document.getElementById("sessao-timer-top").textContent =
          formatDur(sessaoSecs);
        document.getElementById("foco-btn-header").style.display = _isPro
          ? "flex"
          : "none";
        hideAll();
        const ss = document.getElementById("sessao-screen");
        ss.style.display = "flex";
        ss.style.flexDirection = "column";
        const firstPending = sessaoExs.find((se) => se.status === "pendente");
        exAtualId = firstPending
          ? firstPending.id
          : sessaoExs.length
            ? sessaoExs[0].id
            : null;
        if (exAtualId) {
          const se = getAtual();
          globalTimer.def = se._ex.descanso_segundos || 60;
          globalTimer.secs = globalTimer.def;
          globalTimer.fresh = true;
        }
        renderSessao();
        sessaoTimer = setInterval(() => {
          sessaoSecs = Math.floor(
            (Date.now() - new Date(sessaoAtiva.iniciado_em).getTime()) / 1000,
          );
          const el = document.getElementById("sessao-timer-top");
          if (el) el.textContent = formatDur(sessaoSecs);
        }, 1000);
      }

      function getAtual() {
        return sessaoExs.find((se) => se.id === exAtualId) || null;
      }
      function orderedSessaoExs() {
        const pendentes = sessaoExs.filter((se) => se.status === "pendente");
        const concluidos = sessaoExs.filter((se) => se.status !== "pendente");
        const catNomes = CATEGORIAS.map((c) => c.nome);
        const groups = [];
        catNomes.forEach((cat) => {
          const items = pendentes.filter(
            (se) => (se._ex.categoria || "") === cat,
          );
          if (items.length) groups.push({ titulo: cat, items });
        });
        const outras = pendentes.filter(
          (se) => !catNomes.includes(se._ex.categoria || ""),
        );
        if (outras.length) groups.push({ titulo: "Outros", items: outras });
        return { groups, concluidos };
      }

      function renderSessao() {
        const { groups, concluidos } = orderedSessaoExs();
        let html = "";
        groups.forEach((g) => {
          html += `<div class="ex-group-title">${g.titulo}</div>`;
          html += g.items.map((se) => buildExCard(se)).join("");
        });
        if (concluidos.length) {
          html += `<div class="ex-group-title" style="margin-top:18px">Concluídos</div>`;
          html += concluidos.map((se) => buildExCard(se)).join("");
        }
        if (!html)
          html =
            '<div class="empty"><div class="empty-text">Nenhum exercício.</div></div>';
        document.getElementById("sessao-content").innerHTML = html;
        setupSwipeCards();
        updateTimerUI();
      }

      function buildExCard(se) {
        const ex = se._ex;
        const labels = {
          pendente: "Marcar",
          feito: "✓ Feito",
          pulei: "⏭ Pulei",
        };
        const isAtual = exAtualId === se.id;
        const hist = cargaHist[se.exercicio_id] || [];
        let ultimasHtml = "";
        if (_isPro && hist.length) {
          const ultimas = [...hist]
            .reverse()
            .map((h) => h.carga + "kg")
            .join(" → ");
          ultimasHtml = `<div class="ex-ultimas">Últimas: <strong>${ultimas}</strong>${prAntes[se.exercicio_id] ? ` · Recorde: <strong>${prAntes[se.exercicio_id]}kg</strong>` : ""}</div>`;
        } else if (!_isPro && hist.length) {
          ultimasHtml = `<div class="ex-carga-locked">🔒 Referência da última carga <span onclick="event.stopPropagation();showUpsell('Referência de carga','Veja a carga anterior para treinar com mais precisão.')">Desbloquear</span></div>`;
        }
        return `<div class="exercicio-swipe-wrap" id="exwrap-${se.id}">
    <div class="swipe-bg swipe-bg-left">⏭ Pular</div>
    <div class="swipe-bg swipe-bg-right">✓ Feito</div>
    <div class="exercicio-card ${se.status}${isAtual ? " atual" : ""}" id="excard-${se.id}" data-id="${se.id}">
      <div class="ex-top">
        <div><div class="ex-name">${se.nome_snapshot}</div><div class="ex-cat">${ex.categoria || ""}${isAtual ? ' · <span style="color:var(--accent)">atual</span>' : ""}</div></div>
        <button class="ex-status-btn ${se.status}" onclick="event.stopPropagation();cycleStatusById('${se.id}')">${labels[se.status]}</button>
      </div>
      <div class="ex-details">
        ${ex.series ? `<div class="ex-detail"><div class="ex-detail-label">Séries</div><div class="ex-detail-val">${ex.series}</div></div>` : ""}
        ${ex.repeticoes ? `<div class="ex-detail"><div class="ex-detail-label">Reps</div><div class="ex-detail-val">${ex.repeticoes}</div></div>` : ""}
        <div class="ex-detail"><div class="ex-detail-label">Descanso</div><div class="ex-detail-val">${ex.descanso_segundos || 60}s</div></div>
      </div>
      ${ex.series ? `<div class="ex-series-row"><div class="ex-series-label">Séries feitas</div><div class="series-counter"><button class="series-btn" onclick="event.stopPropagation();changeSeriesById('${se.id}',-1)">−</button><div class="series-count" id="sc-${se.id}">${se.series_feitas} / ${ex.series}</div><button class="series-btn" onclick="event.stopPropagation();changeSeriesById('${se.id}',1)">+</button></div></div>` : ""}
      <div class="ex-carga-row" onclick="event.stopPropagation()">
        <span style="font-size:12px;color:var(--text2);white-space:nowrap">Carga (kg)</span>
        <input class="form-input" type="number" inputmode="decimal" placeholder="opcional" value="${se.carga_usada || ""}" oninput="updateCargaById('${se.id}',this.value)" style="padding:8px 12px;font-size:14px"/>
      </div>
      ${ultimasHtml}
    </div>
  </div>`;
      }

      function setupSwipeCards() {
        document.querySelectorAll(".exercicio-card").forEach((card) => {
          let startX = 0,
            startY = 0,
            dx = 0,
            locked = false,
            moved = false;
          card.addEventListener(
            "touchstart",
            (e) => {
              if (e.target.closest("button,input")) return;
              startX = e.touches[0].clientX;
              startY = e.touches[0].clientY;
              dx = 0;
              locked = false;
              moved = false;
              card.style.transition = "none";
            },
            { passive: true },
          );
          card.addEventListener(
            "touchmove",
            (e) => {
              if (e.target.closest("button,input")) return;
              dx = e.touches[0].clientX - startX;
              const dy = e.touches[0].clientY - startY;
              if (!locked) {
                if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy))
                  locked = "h";
                else if (Math.abs(dy) > 12) locked = "v";
              }
              if (locked === "h") {
                e.preventDefault();
                moved = true;
                card.style.transform = `translateX(${dx}px)`;
                const wrap = card.parentElement;
                wrap.classList.toggle("show-right", dx > 30);
                wrap.classList.toggle("show-left", dx < -30);
              }
            },
            { passive: false },
          );
          card.addEventListener("touchend", (e) => {
            if (e.target.closest("button,input")) {
              locked = false;
              moved = false;
              return;
            }
            card.style.transition = "transform .25s ease";
            const wrap = card.parentElement;
            if (locked === "h" && Math.abs(dx) > 80) {
              const id = card.dataset.id;
              const dir = dx > 0 ? "feito" : "pulei";
              card.style.transform = `translateX(${dx > 0 ? "110%" : "-110%"})`;
              setTimeout(() => setStatusById(id, dir), 200);
            } else {
              card.style.transform = "translateX(0)";
              wrap.classList.remove("show-left", "show-right");
              if (!moved && locked !== "v") setExAtualById(card.dataset.id);
            }
          });
          card.addEventListener("click", (e) => {
            if (e.target.closest("button,input")) return;
            if ("ontouchstart" in window) return;
            setExAtualById(card.dataset.id);
          });
        });
      }

      function setExAtualById(id) {
        if (globalTimer.running) {
          showToast("Pause o timer antes.", "error");
          return;
        }
        if (exAtualId === id) return;
        exAtualId = id;
        const se = getAtual();
        if (!se) return;
        globalTimer.def = se._ex.descanso_segundos || 60;
        globalTimer.secs = globalTimer.def;
        globalTimer.fresh = true;
        renderSessao();
        syncFoco();
      }
      function setStatusById(id, status) {
        const se = sessaoExs.find((s) => s.id === id);
        if (!se) return;
        se.status = status;
        db.updateSessaoEx(se.id, { status }).catch(() => {});
        if (status === "feito")
          showToast(`${se.nome_snapshot} concluído! 💪`, "success");
        else if (status === "pulei")
          showToast(`${se.nome_snapshot} pulado.`, "");
        if (exAtualId === id && status !== "pendente") {
          const next = sessaoExs.find((s) => s.status === "pendente");
          exAtualId = next ? next.id : null;
          if (next) {
            globalTimer.def = next._ex.descanso_segundos || 60;
            globalTimer.secs = globalTimer.def;
            globalTimer.fresh = true;
          }
        }
        renderSessao();
        syncFoco();
      }
      function cycleStatusById(id) {
        const se = sessaoExs.find((s) => s.id === id);
        if (!se) return;
        const cycle = { pendente: "feito", feito: "pulei", pulei: "pendente" };
        setStatusById(id, cycle[se.status]);
      }
      function changeSeriesById(id, delta) {
        const se = sessaoExs.find((s) => s.id === id);
        if (!se) return;
        const max = se._ex.series || 99;
        se.series_feitas = Math.max(0, Math.min(max, se.series_feitas + delta));
        db.updateSessaoEx(se.id, { series_feitas: se.series_feitas }).catch(
          () => {},
        );
        const el = document.getElementById(`sc-${se.id}`);
        if (el)
          el.textContent = `${se.series_feitas} / ${se._ex.series || "?"}`;
        if (
          se._ex.series &&
          se.series_feitas >= se._ex.series &&
          se.status !== "feito"
        )
          setStatusById(id, "feito");
        syncFoco();
      }
      function updateCargaById(id, val) {
        const se = sessaoExs.find((s) => s.id === id);
        if (!se) return;
        se.carga_usada = val ? parseFloat(val) : null;
        db.updateSessaoEx(se.id, { carga_usada: se.carga_usada }).catch(
          () => {},
        );
        const max = prAntes[se.exercicio_id];
        if (
          se.carga_usada &&
          max &&
          se.carga_usada > max &&
          !prAvisado[se.exercicio_id]
        ) {
          prAvisado[se.exercicio_id] = true;
          showToast(`🏆 Novo recorde em ${se.nome_snapshot}!`, "pr");
        }
      }

      // Timer
      function ringOffset(circ, pct) {
        return circ * (1 - pct);
      }
      function updateTimerUI() {
        const se = getAtual();
        const nameEl = document.getElementById("footer-ex-name");
        const dispEl = document.getElementById("footer-timer-display");
        const btnEl = document.getElementById("footer-timer-btn");
        const ring = document.getElementById("footer-ring");
        if (!se) {
          nameEl.textContent = "Selecione um exercício";
          dispEl.textContent = "--:--";
          btnEl.disabled = true;
          btnEl.classList.remove("running");
          if (ring) ring.style.strokeDashoffset = 157;
          return;
        }
        nameEl.textContent = se.nome_snapshot;
        dispEl.textContent = formatDur(globalTimer.secs);
        btnEl.disabled = false;
        btnEl.textContent = globalTimer.running ? "⏸" : "▶";
        btnEl.classList.toggle("running", globalTimer.running);
        if (ring) {
          const pct =
            globalTimer.def > 0 ? globalTimer.secs / globalTimer.def : 0;
          ring.style.strokeDashoffset = ringOffset(157, pct);
        }
        syncFoco();
      }
      function toggleGlobalTimer() {
        const se = getAtual();
        if (!se) return;
        if (globalTimer.running) {
          clearInterval(globalTimer.interval);
          globalTimer.running = false;
          globalTimer.secs = Math.max(
            0,
            Math.ceil((globalTimer.endsAt - Date.now()) / 1000),
          );
          globalTimer.endsAt = null;
          releaseWakeLock();
          updateTimerUI();
          return;
        }
        if (globalTimer.fresh) {
          incrementSerieAtual();
          globalTimer.fresh = false;
        }
        if (Notification && Notification.permission === "default") {
          try {
            Notification.requestPermission();
          } catch (e) {}
        }
        globalTimer.running = true;
        globalTimer.endsAt = Date.now() + globalTimer.secs * 1000;
        requestWakeLock();
        updateTimerUI();
        globalTimer.interval = setInterval(timerTick, 250);
      }
      function timerTick() {
        if (!globalTimer.running) return;
        const restante = Math.ceil((globalTimer.endsAt - Date.now()) / 1000);
        if (restante <= 0) {
          clearInterval(globalTimer.interval);
          globalTimer.running = false;
          globalTimer.endsAt = null;
          playBeep();
          notifyRestDone();
          showRestSplash();
          globalTimer.secs = globalTimer.def;
          globalTimer.fresh = true;
        } else {
          globalTimer.secs = restante;
        }
        updateTimerUI();
      }
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          if (globalTimer.running) timerTick();
          if (sessaoAtiva) {
            sessaoSecs = Math.floor(
              (Date.now() - new Date(sessaoAtiva.iniciado_em).getTime()) / 1000,
            );
            const el = document.getElementById("sessao-timer-top");
            if (el) el.textContent = formatDur(sessaoSecs);
          }
        }
      });
      function incrementSerieAtual() {
        const se = getAtual();
        if (!se || !se._ex.series) return;
        const max = se._ex.series;
        if (se.series_feitas < max) {
          se.series_feitas++;
          db.updateSessaoEx(se.id, { series_feitas: se.series_feitas }).catch(
            () => {},
          );
          const el = document.getElementById(`sc-${se.id}`);
          if (el) el.textContent = `${se.series_feitas} / ${max}`;
          if (se.series_feitas >= max && se.status !== "feito")
            setStatusById(se.id, "feito");
        }
        syncFoco();
      }

      // Foco (Pro)
      function abrirFoco() {
        if (!_isPro) {
          showUpsell(
            "Modo Foco",
            "Treine sem distrações, com o timer em tela cheia.",
          );
          return;
        }
        focoAberto = true;
        document.getElementById("foco-treino-nome").textContent =
          sessaoAtiva?.treino_nome || "";
        document.getElementById("foco-screen").style.display = "flex";
        syncFoco();
      }
      function fecharFoco() {
        focoAberto = false;
        document.getElementById("foco-screen").style.display = "none";
        renderSessao();
      }
      function syncFoco() {
        if (!focoAberto) return;
        const se = getAtual();
        const nome = document.getElementById("foco-nome");
        const cat = document.getElementById("foco-cat");
        const serie = document.getElementById("foco-serie");
        const carga = document.getElementById("foco-carga");
        const timeVal = document.getElementById("foco-time-val");
        const playBtn = document.getElementById("foco-play");
        const ring = document.getElementById("foco-ring");
        const hint = document.getElementById("foco-hint");
        if (!se) {
          nome.textContent = "Treino concluído!";
          cat.textContent = "";
          serie.textContent = "";
          carga.textContent = "";
          timeVal.textContent = "✓";
          hint.textContent = "Feche e conclua o treino.";
          playBtn.style.display = "none";
          return;
        }
        playBtn.style.display = "flex";
        nome.textContent = se.nome_snapshot;
        cat.textContent = se._ex.categoria || "";
        serie.innerHTML = se._ex.series
          ? `Série <strong>${Math.min(se.series_feitas + 1, se._ex.series)}</strong> de ${se._ex.series}${se._ex.repeticoes ? ` · ${se._ex.repeticoes} reps` : ""}`
          : "";
        carga.textContent = se.carga_usada ? `Carga: ${se.carga_usada}kg` : "";
        timeVal.textContent = formatDur(globalTimer.secs);
        playBtn.textContent = globalTimer.running ? "⏸" : "▶";
        playBtn.classList.toggle("running", globalTimer.running);
        const pct =
          globalTimer.def > 0 ? globalTimer.secs / globalTimer.def : 0;
        ring.style.strokeDashoffset = ringOffset(653.5, pct);
        hint.textContent = globalTimer.running
          ? "Descansando..."
          : "Toque em ▶ ao terminar a série";
      }
      function focoProximoEx() {
        if (globalTimer.running) {
          showToast("Pause o timer antes.", "error");
          return;
        }
        const p = sessaoExs.filter((se) => se.status === "pendente");
        if (!p.length) return;
        const idx = p.findIndex((se) => se.id === exAtualId);
        setExAtualById(p[(idx + 1) % p.length].id);
      }
      function focoExAnterior() {
        if (globalTimer.running) {
          showToast("Pause o timer antes.", "error");
          return;
        }
        const p = sessaoExs.filter((se) => se.status === "pendente");
        if (!p.length) return;
        const idx = p.findIndex((se) => se.id === exAtualId);
        setExAtualById(p[(idx - 1 + p.length) % p.length].id);
      }

      // Som / Wake Lock
      let audioCtx = null;
      function getAudioCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      }
      document.addEventListener(
        "touchstart",
        () => {
          if (!audioCtx)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === "suspended") audioCtx.resume();
        },
        { passive: true },
      );
      function toggleSound() {
        soundEnabled = !soundEnabled;
        const btn = document.getElementById("sound-btn");
        const icon = document.getElementById("sound-icon");
        if (soundEnabled) {
          btn.classList.remove("muted");
          icon.innerHTML =
            '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/>';
          showToast("Som ativado", "success");
        } else {
          btn.classList.add("muted");
          icon.innerHTML =
            '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
          showToast("Som desativado", "");
        }
      }
      let wakeLock = null;
      async function requestWakeLock() {
        try {
          if ("wakeLock" in navigator)
            wakeLock = await navigator.wakeLock.request("screen");
        } catch (e) {}
      }
      async function releaseWakeLock() {
        try {
          if (wakeLock) {
            await wakeLock.release();
            wakeLock = null;
          }
        } catch (e) {}
      }
      async function playBeep() {
        if (!soundEnabled) {
          releaseWakeLock();
          return;
        }
        try {
          const ctx = getAudioCtx();
          await ctx.resume();
          [0, 150, 300].forEach((delay) => {
            const o = ctx.createOscillator(),
              g = ctx.createGain();
            o.connect(g);
            g.connect(ctx.destination);
            o.frequency.value = 880;
            o.type = "sine";
            g.gain.setValueAtTime(0.3, ctx.currentTime + delay / 1000);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              ctx.currentTime + delay / 1000 + 0.25,
            );
            o.start(ctx.currentTime + delay / 1000);
            o.stop(ctx.currentTime + delay / 1000 + 0.25);
          });
          setTimeout(releaseWakeLock, 800);
        } catch (e) {
          releaseWakeLock();
        }
      }
      function notifyRestDone() {
        try {
          if (
            "Notification" in window &&
            Notification.permission === "granted" &&
            document.hidden
          )
            new Notification(appName(), {
              body: "Descanso concluído! Hora da próxima série 💪",
            });
        } catch (e) {}
      }
      function showRestSplash() {
        const ex = document.getElementById("rest-splash");
        if (ex) ex.remove();
        const el = document.createElement("div");
        el.id = "rest-splash";
        el.style.cssText =
          "position:fixed;inset:0;z-index:1250;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:splashIn .2s ease forwards;";
        el.innerHTML = `<div style="font-size:52px;margin-bottom:20px">💪</div><div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);text-align:center;line-height:1.3;margin-bottom:10px">Descanso<br>concluído</div><div style="font-size:15px;color:var(--accent);font-weight:500">Toque para continuar</div>`;
        el.onclick = () => el.remove();
        document.body.appendChild(el);
        setTimeout(() => {
          if (el.parentNode) el.remove();
        }, 2000);
      }

      // Sair / Concluir
      async function sairSessao() {
        clearInterval(sessaoTimer);
        if (globalTimer.interval) clearInterval(globalTimer.interval);
        globalTimer.running = false;
        releaseWakeLock();
        await db
          .updateSessao(sessaoAtiva.id, { duracao_segundos: sessaoSecs })
          .catch(() => {});
        sessaoTimer = null;
        focoAberto = false;
        document.getElementById("foco-screen").style.display = "none";
        hideAll();
        await init();
      }
      async function concluirTreino() {
        clearInterval(sessaoTimer);
        if (globalTimer.interval) clearInterval(globalTimer.interval);
        globalTimer.running = false;
        releaseWakeLock();
        document.getElementById("foco-screen").style.display = "none";
        focoAberto = false;
        const fim = new Date().toISOString();
        await db.updateSessao(sessaoAtiva.id, {
          finalizado_em: fim,
          duracao_segundos: sessaoSecs,
        });
        await db.updateTreino(sessaoAtiva.treino_id, {
          ultima_vez: todayStr(),
        });
        prsDaSessao = [];
        for (const se of sessaoExs) {
          if (se.carga_usada) {
            await db
              .updateExercicio(se.exercicio_id, { carga_atual: se.carga_usada })
              .catch(() => {});
            const max = prAntes[se.exercicio_id];
            if (se.status === "feito" && (!max || se.carga_usada > max) && max)
              prsDaSessao.push({
                nome: se.nome_snapshot,
                carga: se.carga_usada,
                anterior: max,
              });
          }
        }
        mostrarResultado(fim);
      }
      function mostrarResultado(fim) {
        const feitos = sessaoExs.filter((e) => e.status === "feito").length;
        const pulados = sessaoExs.filter((e) => e.status === "pulei").length;

      // ── CALENDÁRIO ────────────────────────────────────────────────
      async function getCalCache() {
        if (calSessoesCache) return calSessoesCache;
        const sessoes = ((await db.getSessoes()) || []).filter(
          (s) => s.finalizado_em,
        );
        const allTreinos = (await db.getAllTreinos?.()) || treinos;
        const byDay = {};
        sessoes.forEach((s) => {
          const k = dateKey(s.iniciado_em);
          if (!byDay[k]) byDay[k] = [];
          const t = treinos.find((t) => t.id === s.treino_id);
          byDay[k].push({ ...s, treino_nome: t?.nome || "Treino" });
        });
        calSessoesCache = { byDay, total: sessoes.length };
        return calSessoesCache;
      }
      async function renderCalendario(el) {
        el.innerHTML =
          '<div class="loading"><div class="spinner"></div>Carregando...</div>';
        const { byDay } = await getCalCache();
        const hoje = todayStr();
        const now = new Date();
        const freeMin = _isPro
          ? null
          : (() => {
              const d = new Date();
              d.setDate(d.getDate() - d.getDay() - freeCalDays() + 1);
              d.setHours(0, 0, 0, 0);
              return d;
            })();
        const first = new Date(calAno, calMes, 1);
        const startDow = first.getDay();
        const daysInMonth = new Date(calAno, calMes + 1, 0).getDate();
        let cells = "";
        DOW.forEach((d) => (cells += `<div class="cal-dow">${d}</div>`));
        for (let i = 0; i < startDow; i++)
          cells += `<div class="cal-day empty-day"></div>`;
        let treinosNoMes = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          const k = `${calAno}-${String(calMes + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          const dayDate = new Date(k + "T12:00");
          const sess = byDay[k];
          const isHoje = k === hoje;
          const isLocked = !_isPro && freeMin && dayDate < freeMin;
          if (sess && !isLocked) treinosNoMes++;
          cells += `<div class="cal-day${sess && !isLocked ? " treinado" : ""}${isHoje ? " hoje" : ""}${isLocked ? " locked" : ""}"${sess && !isLocked ? ` onclick="abrirDia('${k}')"` : ""}>${d}${sess && !isLocked ? '<div class="cal-day-dot"></div>' : ""}</div>`;
        }
        const ws = new Date(now);
        ws.setDate(now.getDate() - now.getDay());
        ws.setHours(0, 0, 0, 0);
        let semana = 0;
        Object.keys(byDay).forEach((k) => {
          const d = new Date(k + "T12:00");
          if (d >= ws && d <= now) semana++;
        });
        const canNavBack =
          _isPro || (calAno === now.getFullYear() && calMes === now.getMonth());
        const canNavFwd =
          calAno < now.getFullYear() ||
          (calAno === now.getFullYear() && calMes < now.getMonth());
        let html = `<div class="cal-header"><button class="cal-nav-btn" onclick="${canNavBack ? "calNav(-1)" : 'showUpsell(\"Calendário completo\",\"Acesse qualquer período no Pro.\")'}">‹</button><div class="cal-month-label">${MESES[calMes]} ${calAno}</div><button class="cal-nav-btn" onclick="${canNavFwd ? "calNav(1)" : ""}">›</button></div>`;
        if (!_isPro)
          html += `<div class="upsell-block" style="margin-bottom:14px;padding:14px"><div class="upsell-title">🔒 Calendário limitado</div><div class="upsell-sub" style="font-size:12px;margin-bottom:10px">Veja apenas os últimos ${freeCalDays()} dias no plano básico.</div><button class="upsell-btn" style="font-size:13px;padding:9px 18px" onclick="showUpsell('Calendário completo','')">Desbloquear</button></div>`;
        html += `<div class="cal-grid">${cells}</div><div class="cal-legenda">Toque em um dia treinado para ver os detalhes</div><div class="cal-resumo"><div class="cal-resumo-item"><strong>${treinosNoMes}</strong><span>dias no mês</span></div><div class="cal-resumo-item"><strong>${semana}</strong><span>esta semana</span></div></div>`;
        el.innerHTML = html;
      }
      function calNav(dir) {
        calMes += dir;
        if (calMes < 0) {
          calMes = 11;
          calAno--;
        }
        if (calMes > 11) {
          calMes = 0;
          calAno++;
        }
        render();
      }
      async function abrirDia(k) {
        const { byDay } = await getCalCache();
        const sess = byDay[k] || [];
        const dataLabel = new Date(k + "T12:00").toLocaleDateString("pt-BR", {
          weekday: "long",
          day: "2-digit",
          month: "long",
          year: "numeric",
        });
        let html = `<div class="modal-title" style="text-transform:capitalize">${dataLabel}</div>`;
        for (const s of sess) {
          const exs = await db.getSessaoExs(s.id);
          const feitos = exs.filter((e) => e.status === "feito").length;
          const inicio = new Date(s.iniciado_em).toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit",
          });
          const fimS = s.finalizado_em
            ? new Date(s.finalizado_em).toLocaleTimeString("pt-BR", {
                hour: "2-digit",
                minute: "2-digit",
              })
            : "–";
          html += `<div class="modal-day-sessao"><div style="font-weight:600;margin-bottom:4px">${s.treino_nome}</div><div style="font-size:12px;color:var(--text3);margin-bottom:10px">${inicio} → ${fimS} · ${s.duracao_segundos ? formatDur(s.duracao_segundos) : "–"} · ✅ ${feitos}/${exs.length}</div>${exs
            .map((e) => {
              const meta =
                [
                  e.series_feitas > 0 ? `${e.series_feitas} séries` : "",
                  e.carga_usada ? `${e.carga_usada}kg` : "",
                ]
                  .filter(Boolean)
                  .join(" · ") || "–";
              return `<div class="hist-ex-row"><div class="hist-ex-dot ${e.status}"></div><div class="hist-ex-name">${e.nome_snapshot}</div><div class="hist-ex-meta">${meta}</div></div>`;
            })
            .join(
              "",
            )}<div class="hist-actions"><button class="hist-action-btn" onclick="abrirEditarSessao('${s.id}')">✏️ Editar</button><button class="hist-action-btn danger" onclick="excluirSessao('${s.id}')">🗑 Excluir</button></div></div>`;
        }
        html += `<button class="btn-secondary" onclick="_closeModal()">Fechar</button>`;
        openModal(html);
      }

        );

      async function salvarEdicaoSessao(sid) {
        const exs = window._editandoExs || [];

        btn.disabled = true;
        btn.textContent = "Salvando...";

          for (const e of exs) {

              parseInt(document.getElementById(`edit-series-${e.id}`).value) ||

              `edit-carga-${e.id}`,
            ).value;

              status,
              series_feitas: series,
              carga_usada: carga,
            });

      // ── STATS (Pro) ───────────────────────────────────────────────
      async function renderStats(el) {
        el.innerHTML =
          '<div class="loading"><div class="spinner"></div>Calculando...</div>';
        if (!_isPro) {
          el.innerHTML = `<div class="upsell-block"><div class="upsell-lock">📊</div><div class="upsell-title">Stats — Plano Pro</div><div class="upsell-sub">Acompanhe evolução de carga, frequência, recordes e muito mais.</div><button class="upsell-btn" onclick="showUpsell('Stats completo','')">Ver planos</button></div>`;
          return;
        }
        try {
          const sessoes = ((await db.getSessoes()) || []).filter(
            (s) => s.finalizado_em,
          );
          const allExs = await db.getAllSessaoExs();
          const finExs = (allExs || []).filter(
            (r) => r.treinos_sessoes && r.treinos_sessoes.finalizado_em,
          );
          const agora = new Date();
          const mesAtual = sessoes.filter((s) => {
            const d = new Date(s.iniciado_em);
            return (
              d.getMonth() === agora.getMonth() &&
              d.getFullYear() === agora.getFullYear()
            );
          }).length;
          let freqSemanal = "–";
          if (sessoes.length) {
            const dias = new Set(sessoes.map((s) => dateKey(s.iniciado_em)));
            const oldest = new Date(
              Math.min(...sessoes.map((s) => new Date(s.iniciado_em))),
            );
            const semanas = Math.max(
              1,
              Math.ceil((agora - oldest) / (7 * 86400000)),
            );
            freqSemanal = (dias.size / semanas).toFixed(1) + "x";
          }
          let streak = 0;
          if (sessoes.length) {
            const weekKey = (d) => {
              const dt = new Date(d);
              const ws = new Date(dt);
              ws.setDate(dt.getDate() - dt.getDay());
              return dateKey(ws.toISOString());
            };
            const weeks = new Set(sessoes.map((s) => weekKey(s.iniciado_em)));
            let cursor = new Date();
            for (let i = 0; i < 520; i++) {
              const wk = weekKey(cursor.toISOString());
              if (weeks.has(wk)) {
                streak++;
                cursor.setDate(cursor.getDate() - 7);
              } else break;
            }
          }
          const durs = sessoes
            .filter((s) => s.duracao_segundos && s.duracao_segundos < 4 * 3600)
            .map((s) => s.duracao_segundos);
          const tempoMedio = durs.length
            ? formatDur(
                Math.round(durs.reduce((a, b) => a + b, 0) / durs.length),
              )
            : "–";
          const puladosCount = {};
          finExs
            .filter((r) => r.status === "pulei")
            .forEach((r) => {
              puladosCount[r.nome_snapshot] =
                (puladosCount[r.nome_snapshot] || 0) + 1;
            });
          const maisPulado = Object.entries(puladosCount).sort(
            (a, b) => b[1] - a[1],
          )[0];
          const dowCount = {};
          sessoes.forEach((s) => {
            const d = new Date(s.iniciado_em).getDay();
            dowCount[d] = (dowCount[d] || 0) + 1;
          });
          const diaTop = Object.entries(dowCount).sort(
            (a, b) => b[1] - a[1],
          )[0];
          const prs = {};
          finExs
            .filter((r) => r.carga_usada && r.status === "feito")
            .forEach((r) => {
              const c = parseFloat(r.carga_usada);
              if (!prs[r.exercicio_id] || c > prs[r.exercicio_id].carga)
                prs[r.exercicio_id] = { nome: r.nome_snapshot, carga: c };
            });
          const prList = Object.values(prs).sort((a, b) => b.carga - a.carga);
          const chartData = {};
          finExs
            .filter((r) => r.carga_usada && r.status === "feito")
            .forEach((r) => {
              if (!chartData[r.exercicio_id])
                chartData[r.exercicio_id] = {
                  nome: r.nome_snapshot,
                  pontos: [],
                };
              chartData[r.exercicio_id].pontos.push({
                d: new Date(r.treinos_sessoes.iniciado_em),
                c: parseFloat(r.carga_usada),
              });
            });
          Object.values(chartData).forEach((cd) =>
            cd.pontos.sort((a, b) => a.d - b.d),
          );
          const chartOpts = Object.entries(chartData).filter(
            ([, v]) => v.pontos.length >= 2,
          );
          if (!statsExSelecionado && chartOpts.length)
            statsExSelecionado = chartOpts[0][0];
          let html = `<div class="stat-grid"><div class="stat-card"><div class="stat-val">${mesAtual}</div><div class="stat-label">Treinos este mês</div></div><div class="stat-card"><div class="stat-val">${freqSemanal}</div><div class="stat-label">Freq. semanal média</div></div><div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-label">Semanas seguidas</div></div><div class="stat-card"><div class="stat-val">${tempoMedio}</div><div class="stat-label">Tempo médio</div></div><div class="stat-card"><div class="stat-val" style="font-size:14px;line-height:1.3">${maisPulado ? maisPulado[0] : "–"}</div><div class="stat-label">Mais pulado${maisPulado ? ` (${maisPulado[1]}x)` : ""}</div></div><div class="stat-card"><div class="stat-val" style="font-size:16px">${diaTop ? DOW[diaTop[0]] : "–"}</div><div class="stat-label">Dia preferido</div></div></div>`;
          html += `<div class="stats-section-title">📈 Evolução de carga</div><div class="chart-card">`;
          if (chartOpts.length) {
            html += `<select class="form-input" style="margin-bottom:14px" onchange="statsExSelecionado=this.value;render()">${chartOpts.map(([id, v]) => `<option value="${id}"${id === statsExSelecionado ? " selected" : ""}>${v.nome}</option>`).join("")}</select>${buildChart(chartData[statsExSelecionado])}`;
          } else {
            html += `<div class="chart-empty">Registre cargas em pelo menos 2 treinos do mesmo exercício.</div>`;
          }
          html += `</div><div class="stats-section-title">🏆 Recordes pessoais</div>`;
          if (prList.length) {
            html += prList
              .map(
                (p) =>
                  `<div class="pr-item"><div class="pr-item-name">${p.nome}</div><div class="pr-item-val">${p.carga}kg</div></div>`,
              )
              .join("");
          } else {
            html += `<div class="empty" style="padding:24px"><div class="empty-text">Registre cargas para acumular recordes.</div></div>`;
          }
          html += `<button class="export-btn" onclick="exportarStats()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Compartilhar meus stats</button>`;
          el.innerHTML = html;
        } catch (e) {
          el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erro ao calcular.<br><small>${e.message}</small></div></div>`;
        }
      }
      function buildChart(cd) {
        if (!cd || cd.pontos.length < 2)
          return '<div class="chart-empty">Sem dados suficientes.</div>';
        const W = 320,
          H = 160,
          P = 28;
        const pts = cd.pontos;
        const cs = pts.map((p) => p.c);
        let min = Math.min(...cs),
          max = Math.max(...cs);
        if (min === max) {
          min -= 1;
          max += 1;
        }
        const pad = (max - min) * 0.15;
        min -= pad;
        max += pad;
        const x = (i) =>
          P + (W - 2 * P) * (pts.length === 1 ? 0.5 : i / (pts.length - 1));
        const y = (c) => H - P - ((c - min) / (max - min)) * (H - 2 * P);
        const line = pts
          .map(
            (p, i) =>
              `${i === 0 ? "M" : "L"}${x(i).toFixed(1)},${y(p.c).toFixed(1)}`,
          )
          .join(" ");
        const dots = pts
          .map(
            (p, i) =>
              `<circle cx="${x(i).toFixed(1)}" cy="${y(p.c).toFixed(1)}" r="4" fill="var(--accent)"/>`,
          )
          .join("");
        const labels = pts
          .map((p, i) => {
            if (
              pts.length > 6 &&
              i !== 0 &&
              i !== pts.length - 1 &&
              i % Math.ceil(pts.length / 4) !== 0
            )
              return "";
            return `<text x="${x(i).toFixed(1)}" y="${(y(p.c) - 9).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--text2)">${p.c}</text>`;
          })
          .join("");
        const d1 = pts[0].d.toLocaleDateString("pt-BR", {
          day: "2-digit",
          month: "short",
        });
        const d2 = pts[pts.length - 1].d.toLocaleDateString("pt-BR", {
          day: "2-digit",
          month: "short",
        });
        return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto"><path d="${line}" stroke="var(--accent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>${dots}${labels}<text x="${P}" y="${H - 8}" font-size="10" fill="var(--text3)">${d1}</text><text x="${W - P}" y="${H - 8}" text-anchor="end" font-size="10" fill="var(--text3)">${d2}</text></svg><div style="font-size:12px;color:var(--text3);text-align:center;margin-top:8px">${pts.length} registros · ${pts[0].c}kg → ${pts[pts.length - 1].c}kg</div>`;
      }

      function setupExDrag() {
        document.querySelectorAll(".ger-ex-handle").forEach((handle) => {
          let item = null,
            clone = null,
            offY = 0;
          handle.addEventListener(
            "touchstart",
            (e) => {
              item = handle.closest(".ger-ex-item");
              const r = item.getBoundingClientRect();
              offY = e.touches[0].clientY - r.top;
              clone = item.cloneNode(true);
              clone.style.cssText = `position:fixed;left:${r.left}px;width:${r.width}px;top:${r.top}px;z-index:1350;opacity:.9;pointer-events:none;background:var(--surface);border:1px solid var(--accent);border-radius:10px;`;
              document.body.appendChild(clone);
              item.classList.add("dragging");
            },
            { passive: true },
          );
          handle.addEventListener(
            "touchmove",
            (e) => {
              if (!clone) return;
              e.preventDefault();
              clone.style.top = e.touches[0].clientY - offY + "px";
              const list = item.parentElement;
              list
                .querySelectorAll(".ger-ex-item")
                .forEach((i) => i.classList.remove("drag-over"));
              const over = [
                ...list.querySelectorAll(".ger-ex-item:not(.dragging)"),
              ].find((i) => {
                const r = i.getBoundingClientRect();
                return (
                  e.touches[0].clientY > r.top &&
                  e.touches[0].clientY < r.bottom
                );
              });
              if (over) over.classList.add("drag-over");
            },
            { passive: false },
          );
          handle.addEventListener("touchend", async () => {
            if (!clone) return;
            clone.remove();
            clone = null;
            item.classList.remove("dragging");
            const list = item.parentElement;
            const over = list.querySelector(".ger-ex-item.drag-over");
            list
              .querySelectorAll(".ger-ex-item")
              .forEach((i) => i.classList.remove("drag-over"));
            if (over && over !== item) {
              list.insertBefore(item, over);
              const ids = [...list.querySelectorAll(".ger-ex-item")].map(
                (i) => i.dataset.exid,
              );
              try {
                await Promise.all(
                  ids.map((id, i) => db.updateExercicio(id, { posicao: i })),
                );
                showToast("Ordem salva!", "success");
              } catch {
                showToast("Erro.", "error");
              }
            }
            item = null;
          });
        });

        { passive: false },
      );

      // Swipe borda esquerda → voltar
      let edgeSwipe = null;
      document.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length === 1 && e.touches[0].clientX <= 28)
            edgeSwipe = { x: e.touches[0].clientX, y: e.touches[0].clientY };
          else edgeSwipe = null;
        },
        { passive: true },
      );
      document.addEventListener(
        "touchend",
        (e) => {
          if (!edgeSwipe) return;
          const dx = e.changedTouches[0].clientX - edgeSwipe.x;
          const dy = Math.abs(e.changedTouches[0].clientY - edgeSwipe.y);
          edgeSwipe = null;
          if (dx > 70 && dy < 70) goBack();
        },
        { passive: true },
      );
      function isVisible(id) {
        const el = document.getElementById(id);
        return el && el.style.display && el.style.display !== "none";
      }
      function goBack() {
        const splash = document.getElementById("rest-splash");
        if (splash) {
          splash.remove();
          return;
        }
        if (
          document.getElementById("modal-overlay").classList.contains("open")
        ) {
          _closeModal();
          return;
        }
        if (focoAberto) {
          fecharFoco();
          return;
        }
        if (isVisible("tutorial-screen") || isVisible("gerenciar-screen")) {
          hideOverlayScreen();
          return;
        }
        if (isVisible("resultado-screen")) {
          voltarParaHome();
          return;
        }
        if (isVisible("sessao-screen")) {
          sairSessao();
          return;
        }
      }

      // Carrega config antes de exibir auth
      loadConfig().then(() => {
        applyAppName();
      });
    </script>
  </body>
</html>
