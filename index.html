<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TreinoLog"/>
<meta name="theme-color" content="#0a0a0c"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="icon" type="image/png" href="icon-192.png"/>
<title>TreinoLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0c;--surface:#161618;--surface2:#1e1e21;--border:#28282c;
  --accent:#a78bfa;--accent2:#7c3aed;--text:#f0f0f0;--text2:#8a8a92;--text3:#46464d;
  --green:#4ade80;--red:#f87171;--orange:#fb923c;--yellow:#facc15;
  --radius:16px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html[data-theme="light"]{
  --bg:#f4f3f8;--surface:#ffffff;--surface2:#eceaf3;--border:#dcd9e6;
  --accent:#7c3aed;--accent2:#6d28d9;--text:#1a1a22;--text2:#6b6b78;--text3:#a7a7b4;
  --green:#16a34a;--red:#dc2626;--orange:#ea580c;--yellow:#ca8a04;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none;transition:background .3s,color .3s}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* LOGO */
.logo-mark{display:inline-flex;align-items:center;gap:8px}
.logo-mark svg{flex-shrink:0}
.logo-word{font-family:'DM Serif Display',serif;letter-spacing:-0.5px}
.logo-word span{color:var(--accent)}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:1400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 40px calc(40px + var(--safe-bot))}
.pin-logo-icon{margin-bottom:18px}
.pin-logo{font-family:'DM Serif Display',serif;font-size:30px;margin-bottom:6px;text-align:center}
.pin-logo span{color:var(--accent)}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:38px;text-align:center}
.pin-dots{display:flex;gap:16px;margin-bottom:42px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key{aspect-ratio:1;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s,transform .1s}
.pin-key:active{background:var(--surface2);transform:scale(.94)}
.pin-key.del{font-size:18px;color:var(--text2)}
.pin-key.blank{border:none;background:transparent;pointer-events:none}
.pin-error{margin-top:18px;font-size:13px;color:var(--red);min-height:20px;text-align:center}

/* APP SHELL */
#app{display:none;flex-direction:column;height:100vh}
.header{padding:calc(var(--safe-top) + 14px) 20px 12px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:19px}
.header-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer}
.icon-btn svg{width:16px;height:16px;stroke:var(--text2)}
.tabs{display:flex;gap:4px;padding:10px 20px 0;background:var(--bg);position:sticky;top:57px;z-index:99}
.tab{flex:1;padding:9px 0;border-radius:100px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .2s}
.tab.active{background:var(--accent);color:var(--bg)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px calc(60px + var(--safe-bot))}

/* HOME HERO */
.grupo-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;color:var(--text2);margin-bottom:14px;cursor:pointer}
.grupo-badge strong{color:var(--accent)}
.hero-card{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:20px;padding:22px 20px;margin-bottom:18px;position:relative;overflow:hidden;cursor:pointer}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--accent) 18%,transparent) 0%,transparent 70%)}
.hero-tag{display:inline-block;font-size:11px;font-weight:600;color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:100px;padding:3px 10px;margin-bottom:10px;letter-spacing:.4px}
.hero-nome{font-family:'DM Serif Display',serif;font-size:23px;line-height:1.2;margin-bottom:8px;position:relative}
.hero-meta{font-size:12px;color:var(--text2);margin-bottom:16px}
.hero-meta strong{color:var(--text)}
.hero-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;position:relative;transition:opacity .2s}
.hero-btn:active{opacity:.85}
.outros-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:10px}
.treino-mini{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .2s}
.treino-mini.selected{border-color:var(--accent)}
.treino-mini-nome{font-weight:600;font-size:14px;margin-bottom:3px}
.treino-mini-meta{font-size:11px;color:var(--text3)}
.treino-mini-meta strong{color:var(--text2)}
.treino-mini-go{color:var(--text3);font-size:18px}
.continuar-banner{background:color-mix(in srgb,var(--accent) 8%,transparent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--accent)}
.continuar-banner svg{width:16px;height:16px;stroke:var(--accent);flex-shrink:0}

/* SESSÃO */
#sessao-screen{display:none;flex-direction:column;height:100vh;background:var(--bg)}
.sessao-header{padding:calc(var(--safe-top) + 12px) 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);position:sticky;top:0;z-index:100}
.sessao-back{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sessao-back svg{width:16px;height:16px;stroke:var(--text2)}
.sessao-info{flex:1;min-width:0}
.sessao-nome{font-family:'DM Serif Display',serif;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sessao-timer-top{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.sound-btn,.foco-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sound-btn svg{width:15px;height:15px;stroke:var(--accent)}
.sound-btn.muted svg{stroke:var(--text3)}
.foco-btn svg{width:15px;height:15px;stroke:var(--accent)}
.sessao-content{flex:1;overflow-y:auto;padding:12px 20px calc(140px + var(--safe-bot));-webkit-overflow-scrolling:touch}

.ex-group-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin:14px 0 8px;padding-left:2px}
.exercicio-swipe-wrap{position:relative;margin-bottom:12px;border-radius:14px;overflow:hidden}
.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;font-size:14px;font-weight:600;opacity:0;transition:opacity .15s;border-radius:14px}
.swipe-bg-left{background:color-mix(in srgb,var(--orange) 14%,transparent);color:var(--orange);justify-content:flex-end;padding-right:24px}
.swipe-bg-right{background:color-mix(in srgb,var(--green) 14%,transparent);color:var(--green);justify-content:flex-start;padding-left:24px}
.exercicio-swipe-wrap.show-left .swipe-bg-left{opacity:1}
.exercicio-swipe-wrap.show-right .swipe-bg-right{opacity:1}
.exercicio-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;transition:border-color .2s;position:relative;z-index:1;cursor:pointer}
.exercicio-card.feito{border-color:color-mix(in srgb,var(--green) 35%,transparent)}
.exercicio-card.pulei{border-color:color-mix(in srgb,var(--orange) 25%,transparent);opacity:.7}
.exercicio-card.atual{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ex-name{font-weight:600;font-size:15px}
.ex-cat{font-size:11px;color:var(--text3);margin-top:2px}
.ex-status-btn{padding:5px 12px;border-radius:100px;border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface2);color:var(--text2);white-space:nowrap}
.ex-status-btn.feito{background:color-mix(in srgb,var(--green) 14%,transparent);color:var(--green);border-color:color-mix(in srgb,var(--green) 35%,transparent)}
.ex-status-btn.pulei{background:color-mix(in srgb,var(--orange) 14%,transparent);color:var(--orange);border-color:color-mix(in srgb,var(--orange) 35%,transparent)}
.ex-details{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.ex-detail{background:var(--surface2);border-radius:8px;padding:8px;text-align:center}
.ex-detail-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.ex-detail-val{font-size:14px;font-weight:600}
.ex-series-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ex-series-label{font-size:12px;color:var(--text2);flex:1}
.series-counter{display:flex;align-items:center;gap:10px}
.series-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.series-btn:active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.series-count{font-size:15px;font-weight:600;min-width:44px;text-align:center;font-variant-numeric:tabular-nums}
.ex-carga-row{display:flex;align-items:center;gap:8px}
.ex-ultimas{font-size:11px;color:var(--text3);margin-top:8px}
.ex-ultimas strong{color:var(--text2);font-weight:500}
.pr-flash{color:var(--yellow);font-weight:600}

/* FOOTER TIMER */
.sessao-footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:10px 20px calc(12px + var(--safe-bot));background:var(--bg);border-top:1px solid var(--border);z-index:100}
.footer-timer-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.footer-timer-info{flex:1;min-width:0}
.footer-timer-exname{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.footer-timer-display{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent);line-height:1}
.ring-btn-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
.ring-btn-wrap svg.ring{position:absolute;inset:0;transform:rotate(-90deg);pointer-events:none}
.ring-bg{stroke:var(--border);fill:none}
.ring-fg{stroke:var(--accent);fill:none;stroke-linecap:round;transition:stroke-dashoffset .3s linear}
.footer-timer-btn{position:absolute;inset:5px;border-radius:50%;border:none;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.footer-timer-btn:disabled{opacity:.3;cursor:not-allowed}
.footer-timer-btn.running{background:color-mix(in srgb,var(--red) 14%,transparent);color:var(--red)}
.concluir-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--green);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer}

/* MODO FOCO */
#foco-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:1100;flex-direction:column;padding:calc(var(--safe-top)+16px) 24px calc(24px + var(--safe-bot))}
.foco-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.foco-close{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer}
.foco-close svg{width:17px;height:17px;stroke:var(--text2)}
.foco-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.foco-cat{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.foco-nome{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.2;margin-bottom:6px;max-width:320px}
.foco-serie{font-size:15px;color:var(--text2);margin-bottom:6px}
.foco-serie strong{color:var(--accent);font-size:17px}
.foco-carga{font-size:13px;color:var(--text3);margin-bottom:28px}
.foco-ring-wrap{position:relative;width:230px;height:230px;margin-bottom:30px}
.foco-ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg)}
.foco-time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.foco-time-val{font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);line-height:1}
.foco-time-label{font-size:12px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:.6px}
.foco-controls{display:flex;gap:14px;align-items:center}
.foco-play{width:74px;height:74px;border-radius:50%;border:none;background:var(--accent);color:var(--bg);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px color-mix(in srgb,var(--accent) 35%,transparent)}
.foco-play.running{background:var(--red);box-shadow:0 6px 24px color-mix(in srgb,var(--red) 30%,transparent)}
.foco-side-btn{width:54px;height:54px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.foco-footer-hint{text-align:center;font-size:12px;color:var(--text3);margin-top:18px}

/* RESULTADO */
#resultado-screen{display:none;flex-direction:column;height:100vh;background:var(--bg)}
.resultado-header{padding:calc(var(--safe-top)+14px) 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg)}
.resultado-content{flex:1;overflow-y:auto;padding:20px 20px calc(60px + var(--safe-bot))}
.resultado-hero{text-align:center;padding:20px 0 26px}
.resultado-icon{font-size:46px;margin-bottom:10px}
.resultado-titulo{font-family:'DM Serif Display',serif;font-size:25px;margin-bottom:6px}
.resultado-sub{font-size:13px;color:var(--text2)}
.resultado-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.res-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.res-stat-val{font-size:19px;font-weight:700;margin-bottom:4px}
.res-stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.pr-banner{background:color-mix(in srgb,var(--yellow) 9%,transparent);border:1px solid color-mix(in srgb,var(--yellow) 30%,transparent);border-radius:12px;padding:13px 16px;margin-bottom:16px;font-size:13px;color:var(--yellow);line-height:1.6}
.res-ex-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.res-ex-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--surface2)}
.res-ex-info{flex:1}
.res-ex-name{font-weight:500;font-size:14px}
.res-ex-detail{font-size:12px;color:var(--text3);margin-top:2px}
.res-ex-status{font-size:12px;font-weight:600}
.res-ex-status.feito{color:var(--green)}
.res-ex-status.pulei{color:var(--orange)}
.res-ex-status.pendente{color:var(--text3)}
.voltar-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}

/* CALENDÁRIO */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month-label{font-family:'DM Serif Display',serif;font-size:18px}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:18px}
.cal-dow{text-align:center;font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;color:var(--text2);cursor:default;position:relative}
.cal-day.empty-day{background:transparent;border:none}
.cal-day.treinado{background:color-mix(in srgb,var(--accent) 13%,transparent);border-color:color-mix(in srgb,var(--accent) 40%,transparent);color:var(--text);font-weight:600;cursor:pointer}
.cal-day.hoje{box-shadow:0 0 0 1.5px var(--accent)}
.cal-day-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:3px}
.cal-legenda{font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px}
.cal-resumo{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-around;text-align:center}
.cal-resumo-item strong{display:block;font-size:18px;color:var(--accent)}
.cal-resumo-item span{font-size:11px;color:var(--text3)}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
.stat-val{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
.stat-label{font-size:11px;color:var(--text3);line-height:1.4}
.stats-section-title{font-family:'DM Serif Display',serif;font-size:17px;margin:6px 0 12px;color:var(--text2)}
.pr-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.pr-item-name{font-size:14px;font-weight:500;flex:1}
.pr-item-val{font-size:15px;font-weight:700;color:var(--yellow)}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.chart-empty{text-align:center;font-size:13px;color:var(--text3);padding:30px 10px}

/* GERENCIAR */
#gerenciar-screen,#tutorial-screen{display:none;flex-direction:column;height:100vh;background:var(--bg)}
.ger-header{padding:calc(var(--safe-top)+12px) 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg);position:sticky;top:0;z-index:100}
.ger-back{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer}
.ger-back svg{width:16px;height:16px;stroke:var(--text2)}
.ger-title{font-family:'DM Serif Display',serif;font-size:18px;flex:1}
.ger-content{flex:1;overflow-y:auto;padding:16px 20px calc(60px + var(--safe-bot))}
.ger-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.ger-item-header{display:flex;align-items:center;justify-content:space-between}
.ger-item-name{font-weight:500}
.ger-item-sub{font-size:12px;color:var(--text3);margin-top:3px}
.ger-item-actions{display:flex;gap:6px}
.ger-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.ger-btn svg{width:13px;height:13px;stroke:var(--text2)}
.ger-btn.danger{border-color:color-mix(in srgb,var(--red) 25%,transparent)}
.ger-btn.danger svg{stroke:var(--red)}
.ger-add-btn{width:100%;padding:12px;border-radius:10px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:4px}
.grupo-ativo-badge{font-size:11px;padding:2px 8px;border-radius:100px;background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);margin-left:8px}
.ger-treino-block{margin-left:14px;margin-top:8px}
.ger-ex-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:6px;margin-left:14px;display:flex;align-items:center;gap:10px;touch-action:none;user-select:none}
.ger-ex-item.dragging{opacity:.4}
.ger-ex-item.drag-over{box-shadow:0 0 0 2px var(--accent)}
.ger-ex-handle{color:var(--text3);font-size:15px;cursor:grab;flex-shrink:0;padding:2px}
.ger-ex-info{flex:1;min-width:0}
.ger-ex-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ger-ex-sub{font-size:11px;color:var(--text3)}

/* TUTORIAL */
.tut-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 16px;margin-bottom:14px}
.tut-section-title{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tut-text{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:8px}
.tut-text:last-child{margin-bottom:0}
.tut-text strong{color:var(--text)}
.tut-accent{color:var(--accent);font-weight:500}
.tut-green{color:var(--green);font-weight:500}
.tut-orange{color:var(--orange);font-weight:500}
.tut-tip{background:color-mix(in srgb,var(--accent) 8%,transparent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--accent);margin-top:10px;line-height:1.5}
.tut-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.tut-step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--bg);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tut-step-text{font-size:14px;color:var(--text2);line-height:1.55;flex:1}
.tut-step-text strong{color:var(--text)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px calc(24px + var(--safe-bot));width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 20px}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;-webkit-appearance:none}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
select.form-input{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;margin-top:8px}
.modal-day-sessao{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.hist-actions{display:flex;gap:8px;margin-top:12px}
.hist-action-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.hist-action-btn.danger{color:var(--red);border-color:color-mix(in srgb,var(--red) 25%,transparent)}
.hist-ex-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.hist-ex-row:last-child{border-bottom:none}
.hist-ex-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hist-ex-dot.feito{background:var(--green)}
.hist-ex-dot.pulei{background:var(--orange)}
.hist-ex-dot.pendente{background:var(--text3)}
.hist-ex-name{font-size:13px;font-weight:500;flex:1}
.hist-ex-meta{font-size:11px;color:var(--text3);text-align:right;line-height:1.5}

/* MISC */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.6}
.loading{text-align:center;padding:60px 20px;color:var(--text3)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(90px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:9px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:1500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.pr{border-color:var(--yellow);color:var(--yellow)}
@keyframes splashIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
</style>
</head>

<script>
// ===================== CONFIG =====================
const SUPABASE_URL='https://asnuusgwtsjpwuaakfuc.supabase.co';
const SUPABASE_KEY='sb_publishable_Z46thUwaqpXRR8i2PxZWzQ_oG2eJ3yK';
const PIN='1741';
const CATEGORIAS=['Peito','Costas','Ombro','Bíceps','Tríceps','Perna','Abdômen'];
const DOW=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// ===================== THEME =====================
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  try{localStorage.setItem('treinolog_theme',t);}catch(e){}
  const icon=document.getElementById('theme-icon');
  if(icon){
    icon.innerHTML=t==='dark'
      ?'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>'
      :'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark'?'light':'dark');
}
try{applyTheme(localStorage.getItem('treinolog_theme')||'dark');}catch(e){}

// ===================== PIN =====================
let pinVal='';
document.querySelectorAll('.pin-key[data-pin]').forEach(k=>{
  k.addEventListener('touchstart',e=>{e.preventDefault();handlePinKey(k.dataset.pin);},{passive:false});
  k.addEventListener('mousedown',e=>{e.preventDefault();handlePinKey(k.dataset.pin);});
});
function handlePinKey(v){
  if(v==='del'){pinVal=pinVal.slice(0,-1);updateDots();document.getElementById('pin-error').textContent='';return;}
  if(pinVal.length>=4)return;
  pinVal+=v;updateDots();
  if(pinVal.length===4)setTimeout(checkPin,100);
}
function updateDots(){for(let i=0;i<4;i++){const d=document.getElementById('d'+i);d.classList.remove('filled','error');if(i<pinVal.length)d.classList.add('filled');}}
function checkPin(){
  if(pinVal===PIN){document.getElementById('pin-screen').style.display='none';showApp();init();}
  else{for(let i=0;i<4;i++)document.getElementById('d'+i).classList.replace('filled','error');document.getElementById('pin-error').textContent='PIN incorreto.';setTimeout(()=>{pinVal='';updateDots();document.getElementById('pin-error').textContent='';},800);}
}

// ===================== API =====================
async function sbFetch(path,opts={}){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):null;
}
const api={
  getGrupos:()=>sbFetch('treinos_grupos?order=nome.asc'),
  insertGrupo:(d)=>sbFetch('treinos_grupos',{method:'POST',body:JSON.stringify(d)}),
  updateGrupo:(id,d)=>sbFetch(`treinos_grupos?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(d)}),
  deleteGrupo:(id)=>sbFetch(`treinos_grupos?id=eq.${id}`,{method:'DELETE',headers:{Prefer:'return=minimal'}}),
  getTreinos:(gid)=>sbFetch(`treinos_treinos?grupo_id=eq.${gid}&order=nome.asc`),
  getAllTreinos:()=>sbFetch('treinos_treinos?order=nome.asc'),
  insertTreino:(d)=>sbFetch('treinos_treinos',{method:'POST',body:JSON.stringify(d)}),
  updateTreino:(id,d)=>sbFetch(`treinos_treinos?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(d)}),
  deleteTreino:(id)=>sbFetch(`treinos_treinos?id=eq.${id}`,{method:'DELETE',headers:{Prefer:'return=minimal'}}),
  getExercicios:(tid)=>sbFetch(`treinos_exercicios?treino_id=eq.${tid}&order=posicao.asc`),
  insertExercicio:(d)=>sbFetch('treinos_exercicios',{method:'POST',body:JSON.stringify(d)}),
  updateExercicio:(id,d)=>sbFetch(`treinos_exercicios?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(d)}),
  deleteExercicio:(id)=>sbFetch(`treinos_exercicios?id=eq.${id}`,{method:'DELETE',headers:{Prefer:'return=minimal'}}),
  getSessoes:()=>sbFetch('treinos_sessoes?order=iniciado_em.desc&limit=400'),
  getSessoesAbertasHoje:()=>{const d=new Date();d.setHours(0,0,0,0);return sbFetch(`treinos_sessoes?finalizado_em=is.null&iniciado_em=gte.${d.toISOString()}&order=iniciado_em.desc`);},
  getSessoesAbertas:()=>sbFetch('treinos_sessoes?finalizado_em=is.null&order=iniciado_em.desc'),
  getUltimaSessaoTreino:(tid)=>sbFetch(`treinos_sessoes?treino_id=eq.${tid}&finalizado_em=not.is.null&order=iniciado_em.desc&limit=1`),
  getSessoesFinalizadasTreino:(tid)=>sbFetch(`treinos_sessoes?treino_id=eq.${tid}&finalizado_em=not.is.null&select=id`),
  insertSessao:(d)=>sbFetch('treinos_sessoes',{method:'POST',body:JSON.stringify(d)}),
  updateSessao:(id,d)=>sbFetch(`treinos_sessoes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(d)}),
  deleteSessao:(id)=>sbFetch(`treinos_sessoes?id=eq.${id}`,{method:'DELETE',headers:{Prefer:'return=minimal'}}),
  getSessaoExs:(sid)=>sbFetch(`treinos_sessao_exercicios?sessao_id=eq.${sid}&order=id.asc`),
  insertSessaoEx:(d)=>sbFetch('treinos_sessao_exercicios',{method:'POST',body:JSON.stringify(d)}),
  updateSessaoEx:(id,d)=>sbFetch(`treinos_sessao_exercicios?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(d)}),
  deleteSessaoExsBySessao:(sid)=>sbFetch(`treinos_sessao_exercicios?sessao_id=eq.${sid}`,{method:'DELETE',headers:{Prefer:'return=minimal'}}),
  // Carga history com embed da sessão
  getCargaHistory:()=>sbFetch('treinos_sessao_exercicios?select=exercicio_id,carga_usada,status,sessao_id,treinos_sessoes(iniciado_em,finalizado_em)&carga_usada=not.is.null'),
};

// ===================== STATE =====================
const uid=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const dateKey=iso=>{const d=new Date(iso);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
let grupos=[],grupoAtivo=null,treinos=[],currentTab='home',selectedTreinoId=null;
let sessaoAtiva=null,sessaoExs=[],sessaoTimer=null,sessaoSecs=0;
let exAtualId=null;
let globalTimer={secs:0,def:60,running:false,interval:null,fresh:true};
let cargaHist={};      // exercicio_id -> [{carga,data}] desc
let prAntes={};        // exercicio_id -> max carga histórica (antes desta sessão)
let prsDaSessao=[];    // PRs batidos nesta sessão
let prAvisado={};      // evita toast duplicado
let calAno=new Date().getFullYear(), calMes=new Date().getMonth();
let calSessoesCache=null;

function showApp(){const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';}
function hideAll(){['app','sessao-screen','resultado-screen','gerenciar-screen','tutorial-screen'].forEach(id=>{document.getElementById(id).style.display='none';});}
function hideOverlayScreen(){hideAll();showApp();render();}

// ===================== INIT =====================
async function init(){
  showApp();
  try{
    grupos=await api.getGrupos();
    grupoAtivo=grupos.find(g=>g.ativo)||null;
    treinos=grupoAtivo?await api.getTreinos(grupoAtivo.id):[];
    for(const t of treinos){
      const s=await api.getUltimaSessaoTreino(t.id);
      t.ultima_vez=s&&s.length?s[0].iniciado_em:null;
      const fs=await api.getSessoesFinalizadasTreino(t.id);
      t.vezes_feito=fs?fs.length:0;
    }
    if(treinos.length){
      const sorted=[...treinos].sort((a,b)=>{if(!a.ultima_vez)return -1;if(!b.ultima_vez)return 1;return new Date(a.ultima_vez)-new Date(b.ultima_vez);});
      selectedTreinoId=sorted[0].id;
    }
    await fecharSessoesAntigas();
    calSessoesCache=null;
    render();
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erro ao conectar.<br><small style="color:var(--text3)">${e.message}</small></div></div>`;
  }
}

async function fecharSessoesAntigas(){
  const abertas=await api.getSessoesAbertas();
  if(!abertas||!abertas.length)return;
  const hoje=todayStr();
  for(const s of abertas){
    if(dateKey(s.iniciado_em)!==hoje){
      const fim=new Date(new Date(s.iniciado_em).getTime()+3600000).toISOString();
      await api.updateSessao(s.id,{finalizado_em:fim,duracao_segundos:3600});
    }
  }
}

// ===================== HOME (HERO) =====================
async function renderHome(el){
  if(!grupoAtivo){
    el.innerHTML=`<div class="empty"><div class="empty-icon">💪</div><div class="empty-text">Nenhum grupo ativo.<br>Vá em Gerenciar (⚙️) para criar e ativar um grupo.</div></div>`;
    return;
  }
  if(!treinos.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nenhum treino em <strong>${grupoAtivo.nome}</strong>.<br>Vá em Gerenciar para adicionar treinos.</div></div>`;
    return;
  }
  const abertasHoje=await api.getSessoesAbertasHoje();
  const sessaoHoje=abertasHoje&&abertasHoje.length?abertasHoje[0]:null;
  if(sessaoHoje)selectedTreinoId=sessaoHoje.treino_id;

  const sorted=[...treinos].sort((a,b)=>{if(!a.ultima_vez)return -1;if(!b.ultima_vez)return 1;return new Date(a.ultima_vez)-new Date(b.ultima_vez);});
  const hero=treinos.find(t=>t.id===selectedTreinoId)||sorted[0];
  const isSugerido=hero.id===sorted[0].id;
  const ulv=hero.ultima_vez?new Date(hero.ultima_vez).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}):'Nunca';
  const heroBtn=sessaoHoje&&sessaoHoje.treino_id===hero.id?'Continuar Treino ▸':'Iniciar Treino ▸';

  let html=`<div class="grupo-badge" onclick="showGerenciar()">Grupo: <strong>${grupoAtivo.nome}</strong></div>`;
  if(sessaoHoje){
    html+=`<div class="continuar-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Treino de hoje em andamento
    </div>`;
  }
  html+=`<div class="hero-card" onclick="iniciarTreino()">
    <div class="hero-tag">${sessaoHoje&&sessaoHoje.treino_id===hero.id?'⏱ EM ANDAMENTO':isSugerido?'✦ SUGERIDO PARA HOJE':'SELECIONADO'}</div>
    <div class="hero-nome">${hero.nome}</div>
    <div class="hero-meta">Último: <strong>${ulv}</strong> · Feito <strong>${hero.vezes_feito||0}x</strong></div>
    <button class="hero-btn">${heroBtn}</button>
  </div>`;

  const outros=treinos.filter(t=>t.id!==hero.id);
  if(outros.length){
    html+=`<div class="outros-title">Outros treinos do grupo</div>`;
    outros.forEach(t=>{
      const u=t.ultima_vez?new Date(t.ultima_vez).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}):'Nunca';
      html+=`<div class="treino-mini" onclick="selecionarHero('${t.id}')">
        <div>
          <div class="treino-mini-nome">${t.nome}</div>
          <div class="treino-mini-meta">Último: <strong>${u}</strong> · Feito <strong>${t.vezes_feito||0}x</strong></div>
        </div>
        <div class="treino-mini-go">›</div>
      </div>`;
    });
  }
  el.innerHTML=html;
}

function selecionarHero(id){selectedTreinoId=id;render();}

// ===================== SESSÃO =====================
async function iniciarTreino(){
  if(!selectedTreinoId)return;
  const abertasHoje=await api.getSessoesAbertasHoje();
  const sessaoHoje=abertasHoje&&abertasHoje.length?abertasHoje[0]:null;
  if(sessaoHoje){
    if(sessaoHoje.treino_id===selectedTreinoId){await continuarSessao(sessaoHoje);return;}
    await api.deleteSessaoExsBySessao(sessaoHoje.id);
    await api.deleteSessao(sessaoHoje.id);
  }
  const treino=treinos.find(t=>t.id===selectedTreinoId);
  const exercicios=await api.getExercicios(selectedTreinoId);
  if(!exercicios||!exercicios.length){showToast('Adicione exercícios a este treino.','error');return;}

  await carregarCargaHist();

  const sessaoId=uid();
  const agora=new Date().toISOString();
  await api.insertSessao({id:sessaoId,treino_id:selectedTreinoId,iniciado_em:agora});
  sessaoExs=[];
  for(const ex of exercicios){
    const seid=uid();
    const hist=cargaHist[ex.id]||[];
    const carga=hist.length?hist[0].carga:(ex.carga_atual||null);
    await api.insertSessaoEx({id:seid,sessao_id:sessaoId,exercicio_id:ex.id,nome_snapshot:ex.nome,status:'pendente',series_feitas:0,carga_usada:carga});
    sessaoExs.push({id:seid,exercicio_id:ex.id,nome_snapshot:ex.nome,status:'pendente',series_feitas:0,carga_usada:carga,_ex:ex});
  }
  sessaoAtiva={id:sessaoId,treino_id:selectedTreinoId,treino_nome:treino.nome,iniciado_em:agora};
  sessaoSecs=0;prsDaSessao=[];prAvisado={};
  exAtualId=null;globalTimer={secs:0,def:60,running:false,interval:null,fresh:true};
  soundEnabled=true;
  abrirTela();
}

async function continuarSessao(s){
  const treino=treinos.find(t=>t.id===s.treino_id);
  const exercicios=await api.getExercicios(s.treino_id);
  const exsDB=await api.getSessaoExs(s.id);
  await carregarCargaHist(s.id);
  sessaoExs=exsDB.map(se=>{
    const ex=exercicios.find(e=>e.id===se.exercicio_id)||{nome:se.nome_snapshot,categoria:'',series:null,repeticoes:null,descanso_segundos:60};
    return {...se,_ex:ex};
  });
  sessaoSecs=Math.floor((Date.now()-new Date(s.iniciado_em).getTime())/1000);
  sessaoAtiva={id:s.id,treino_id:s.treino_id,treino_nome:treino?.nome||'Treino',iniciado_em:s.iniciado_em};
  prsDaSessao=[];prAvisado={};
  exAtualId=null;globalTimer={secs:0,def:60,running:false,interval:null,fresh:true};
  soundEnabled=true;
  abrirTela();
}

async function carregarCargaHist(excluirSessaoId){
  cargaHist={};prAntes={};
  try{
    const rows=await api.getCargaHistory();
    const fin=(rows||[]).filter(r=>r.treinos_sessoes&&r.treinos_sessoes.finalizado_em&&r.sessao_id!==excluirSessaoId);
    fin.sort((a,b)=>new Date(b.treinos_sessoes.iniciado_em)-new Date(a.treinos_sessoes.iniciado_em));
    fin.forEach(r=>{
      if(!cargaHist[r.exercicio_id])cargaHist[r.exercicio_id]=[];
      if(cargaHist[r.exercicio_id].length<3)cargaHist[r.exercicio_id].push({carga:parseFloat(r.carga_usada),data:r.treinos_sessoes.iniciado_em});
      const c=parseFloat(r.carga_usada);
      if(!prAntes[r.exercicio_id]||c>prAntes[r.exercicio_id])prAntes[r.exercicio_id]=c;
    });
  }catch(e){}
}

function abrirTela(){
  document.getElementById('sessao-nome').textContent=sessaoAtiva.treino_nome;
  document.getElementById('sessao-timer-top').textContent=formatDur(sessaoSecs);
  hideAll();
  const ss=document.getElementById('sessao-screen');ss.style.display='flex';ss.style.flexDirection='column';
  const firstPending=sessaoExs.find(se=>se.status==='pendente');
  exAtualId=firstPending?firstPending.id:(sessaoExs.length?sessaoExs[0].id:null);
  if(exAtualId!==null){
    const se=getAtual();
    globalTimer.def=se._ex.descanso_segundos||60;
    globalTimer.secs=globalTimer.def;
    globalTimer.fresh=true;
  }
  renderSessao();
  sessaoTimer=setInterval(()=>{sessaoSecs++;const el=document.getElementById('sessao-timer-top');if(el)el.textContent=formatDur(sessaoSecs);},1000);
}

function getAtual(){return sessaoExs.find(se=>se.id===exAtualId)||null;}

function orderedSessaoExs(){
  const pendentes=sessaoExs.filter(se=>se.status==='pendente');
  const concluidos=sessaoExs.filter(se=>se.status!=='pendente');
  const groups=[];
  CATEGORIAS.forEach(cat=>{
    const items=pendentes.filter(se=>(se._ex.categoria||'')===cat);
    if(items.length)groups.push({titulo:cat,items});
  });
  const outras=pendentes.filter(se=>!CATEGORIAS.includes(se._ex.categoria||''));
  if(outras.length)groups.push({titulo:'Outros',items:outras});
  return {groups,concluidos};
}

function renderSessao(){
  const {groups,concluidos}=orderedSessaoExs();
  let html='';
  groups.forEach(g=>{
    html+=`<div class="ex-group-title">${g.titulo}</div>`;
    html+=g.items.map(se=>buildExCard(se)).join('');
  });
  if(concluidos.length){
    html+=`<div class="ex-group-title" style="margin-top:18px">Concluídos</div>`;
    html+=concluidos.map(se=>buildExCard(se)).join('');
  }
  if(!html)html='<div class="empty"><div class="empty-text">Nenhum exercício.</div></div>';
  document.getElementById('sessao-content').innerHTML=html;
  setupSwipeCards();
  updateTimerUI();
}

function buildExCard(se){
  const ex=se._ex;
  const labels={pendente:'Marcar',feito:'✓ Feito',pulei:'⏭ Pulei'};
  const isAtual=exAtualId===se.id;
  const hist=cargaHist[se.exercicio_id]||[];
  const ultimas=hist.length?[...hist].reverse().map(h=>h.carga+'kg').join(' → '):null;
  return `<div class="exercicio-swipe-wrap" id="exwrap-${se.id}">
    <div class="swipe-bg swipe-bg-left">⏭ Pular</div>
    <div class="swipe-bg swipe-bg-right">✓ Feito</div>
    <div class="exercicio-card ${se.status}${isAtual?' atual':''}" id="excard-${se.id}" data-id="${se.id}">
      <div class="ex-top">
        <div><div class="ex-name">${se.nome_snapshot}</div><div class="ex-cat">${ex.categoria||''}${isAtual?' · <span style="color:var(--accent)">atual</span>':''}</div></div>
        <button class="ex-status-btn ${se.status}" onclick="event.stopPropagation();cycleStatusById('${se.id}')">${labels[se.status]}</button>
      </div>
      <div class="ex-details">
        ${ex.series?`<div class="ex-detail"><div class="ex-detail-label">Séries</div><div class="ex-detail-val">${ex.series}</div></div>`:''}
        ${ex.repeticoes?`<div class="ex-detail"><div class="ex-detail-label">Reps</div><div class="ex-detail-val">${ex.repeticoes}</div></div>`:''}
        <div class="ex-detail"><div class="ex-detail-label">Descanso</div><div class="ex-detail-val">${ex.descanso_segundos||60}s</div></div>
      </div>
      ${ex.series?`<div class="ex-series-row">
        <div class="ex-series-label">Séries feitas</div>
        <div class="series-counter">
          <button class="series-btn" onclick="event.stopPropagation();changeSeriesById('${se.id}',-1)">−</button>
          <div class="series-count" id="sc-${se.id}">${se.series_feitas} / ${ex.series}</div>
          <button class="series-btn" onclick="event.stopPropagation();changeSeriesById('${se.id}',1)">+</button>
        </div>
      </div>`:''}
      <div class="ex-carga-row" onclick="event.stopPropagation()">
        <span style="font-size:12px;color:var(--text2);white-space:nowrap">Carga (kg)</span>
        <input class="form-input" type="number" inputmode="decimal" placeholder="opcional" value="${se.carga_usada||''}" oninput="updateCargaById('${se.id}',this.value)" style="padding:8px 12px;font-size:14px"/>
      </div>
      ${ultimas?`<div class="ex-ultimas">Últimas: <strong>${ultimas}</strong>${prAntes[se.exercicio_id]?` · Recorde: <strong>${prAntes[se.exercicio_id]}kg</strong>`:''}</div>`:''}
    </div>
  </div>`;
}

// ===== SWIPE =====
function setupSwipeCards(){
  document.querySelectorAll('.exercicio-card').forEach(card=>{
    let startX=0,startY=0,dx=0,locked=false,moved=false;
    card.addEventListener('touchstart',e=>{
      if(e.target.closest('button,input'))return;
      startX=e.touches[0].clientX;startY=e.touches[0].clientY;
      dx=0;locked=false;moved=false;
      card.style.transition='none';
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      if(e.target.closest('button,input'))return;
      dx=e.touches[0].clientX-startX;
      const dy=e.touches[0].clientY-startY;
      if(!locked){
        if(Math.abs(dx)>12&&Math.abs(dx)>Math.abs(dy))locked='h';
        else if(Math.abs(dy)>12)locked='v';
      }
      if(locked==='h'){
        e.preventDefault();moved=true;
        card.style.transform=`translateX(${dx}px)`;
        const wrap=card.parentElement;
        wrap.classList.toggle('show-right',dx>30);
        wrap.classList.toggle('show-left',dx<-30);
      }
    },{passive:false});
    card.addEventListener('touchend',e=>{
      if(e.target.closest('button,input')){locked=false;moved=false;return;}
      card.style.transition='transform .25s ease';
      const wrap=card.parentElement;
      if(locked==='h'&&Math.abs(dx)>80){
        const id=card.dataset.id;
        const dir=dx>0?'feito':'pulei';
        card.style.transform=`translateX(${dx>0?'110%':'-110%'})`;
        setTimeout(()=>setStatusById(id,dir),200);
      }else{
        card.style.transform='translateX(0)';
        wrap.classList.remove('show-left','show-right');
        if(!moved&&locked!=='v')setExAtualById(card.dataset.id);
      }
    });
    // Desktop click
    card.addEventListener('click',e=>{
      if(e.target.closest('button,input'))return;
      if('ontouchstart' in window)return;
      setExAtualById(card.dataset.id);
    });
  });
}

function setExAtualById(id){
  if(globalTimer.running){showToast('Pause o timer antes de trocar de exercício.','error');return;}
  if(exAtualId===id)return;
  exAtualId=id;
  const se=getAtual();
  if(!se)return;
  globalTimer.def=se._ex.descanso_segundos||60;
  globalTimer.secs=globalTimer.def;
  globalTimer.fresh=true;
  renderSessao();
  syncFoco();
}

function setStatusById(id,status){
  const se=sessaoExs.find(s=>s.id===id);
  if(!se)return;
  se.status=status;
  api.updateSessaoEx(se.id,{status}).catch(()=>{});
  if(status==='feito')showToast(`${se.nome_snapshot} concluído! 💪`,'success');
  else if(status==='pulei')showToast(`${se.nome_snapshot} pulado.`,'');
  if(exAtualId===id&&status!=='pendente'){
    const next=sessaoExs.find(s=>s.status==='pendente');
    exAtualId=next?next.id:null;
    if(next){globalTimer.def=next._ex.descanso_segundos||60;globalTimer.secs=globalTimer.def;globalTimer.fresh=true;}
  }
  renderSessao();
  syncFoco();
}

function cycleStatusById(id){
  const se=sessaoExs.find(s=>s.id===id);
  if(!se)return;
  const cycle={pendente:'feito',feito:'pulei',pulei:'pendente'};
  setStatusById(id,cycle[se.status]);
}

function changeSeriesById(id,delta){
  const se=sessaoExs.find(s=>s.id===id);
  if(!se)return;
  const max=se._ex.series||99;
  se.series_feitas=Math.max(0,Math.min(max,se.series_feitas+delta));
  api.updateSessaoEx(se.id,{series_feitas:se.series_feitas}).catch(()=>{});
  const el=document.getElementById(`sc-${se.id}`);
  if(el)el.textContent=`${se.series_feitas} / ${se._ex.series||'?'}`;
  if(se._ex.series&&se.series_feitas>=se._ex.series&&se.status!=='feito')setStatusById(id,'feito');
  syncFoco();
}

function updateCargaById(id,val){
  const se=sessaoExs.find(s=>s.id===id);
  if(!se)return;
  se.carga_usada=val?parseFloat(val):null;
  api.updateSessaoEx(se.id,{carga_usada:se.carga_usada}).catch(()=>{});
  // PR detection ao vivo
  const max=prAntes[se.exercicio_id];
  if(se.carga_usada&&max&&se.carga_usada>max&&!prAvisado[se.exercicio_id]){
    prAvisado[se.exercicio_id]=true;
    showToast(`🏆 Novo recorde em ${se.nome_snapshot}!`,'pr');
  }
}

// ===== TIMER GLOBAL + RING + FOCO =====
function ringOffset(circ,pct){return circ*(1-pct);}

function updateTimerUI(){
  const se=getAtual();
  const nameEl=document.getElementById('footer-ex-name');
  const dispEl=document.getElementById('footer-timer-display');
  const btnEl=document.getElementById('footer-timer-btn');
  const ring=document.getElementById('footer-ring');
  if(!se){
    nameEl.textContent='Selecione um exercício';
    dispEl.textContent='--:--';
    btnEl.disabled=true;btnEl.classList.remove('running');
    if(ring)ring.style.strokeDashoffset=157;
    return;
  }
  nameEl.textContent=se.nome_snapshot;
  dispEl.textContent=formatDur(globalTimer.secs);
  btnEl.disabled=false;
  btnEl.textContent=globalTimer.running?'⏸':'▶';
  btnEl.classList.toggle('running',globalTimer.running);
  if(ring){
    const pct=globalTimer.def>0?globalTimer.secs/globalTimer.def:0;
    ring.style.strokeDashoffset=ringOffset(157,pct);
  }
  syncFoco();
}

function toggleGlobalTimer(){
  const se=getAtual();
  if(!se)return;
  if(globalTimer.running){
    clearInterval(globalTimer.interval);
    globalTimer.running=false;
    releaseWakeLock();
    updateTimerUI();
    return;
  }
  if(globalTimer.fresh){
    incrementSerieAtual();
    globalTimer.fresh=false;
  }
  if(Notification&&Notification.permission==='default'){try{Notification.requestPermission();}catch(e){}}
  globalTimer.running=true;
  requestWakeLock();
  updateTimerUI();
  globalTimer.interval=setInterval(()=>{
    globalTimer.secs--;
    if(globalTimer.secs<=0){
      clearInterval(globalTimer.interval);
      globalTimer.running=false;
      playBeep();
      notifyRestDone();
      showRestSplash();
      globalTimer.secs=globalTimer.def;
      globalTimer.fresh=true;
    }
    updateTimerUI();
  },1000);
}

function incrementSerieAtual(){
  const se=getAtual();
  if(!se||!se._ex.series)return;
  const max=se._ex.series;
  if(se.series_feitas<max){
    se.series_feitas++;
    api.updateSessaoEx(se.id,{series_feitas:se.series_feitas}).catch(()=>{});
    const el=document.getElementById(`sc-${se.id}`);
    if(el)el.textContent=`${se.series_feitas} / ${max}`;
    if(se.series_feitas>=max&&se.status!=='feito')setStatusById(se.id,'feito');
  }
  syncFoco();
}

function focoProximoEx(){

  const next=pendentes[(idx+1)%pendentes.length];
  if(next)setExAtualById(next.id);
}
function focoExAnterior(){
  if(globalTimer.running){showToast('Pause o timer antes.','error');return;}

  if(!pendentes.length)return;
  const idx=pendentes.findIndex(se=>se.id===exAtualId);
  const prev=pendentes[(idx-1+pendentes.length)%pendentes.length];
  if(prev)setExAtualById(prev.id);
}

let soundEnabled=true;
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
document.addEventListener('touchstart',()=>{
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
},{passive:true});

function toggleSound(){

    showToast('Som ativado','success');
  }else{
    btn.classList.add('muted');
    icon.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
    showToast('Som desativado','');

let wakeLock=null;
async function requestWakeLock(){try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
async function releaseWakeLock(){try{if(wakeLock){await wakeLock.release();wakeLock=null;}}catch(e){}}

async function playBeep(){
  if(!soundEnabled){releaseWakeLock();return;}
  try{
    const ctx=getAudioCtx();
    await ctx.resume();
    [0,150,300].forEach(delay=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+delay/1000);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay/1000+0.25);
      o.start(ctx.currentTime+delay/1000);
      o.stop(ctx.currentTime+delay/1000+0.25);
    });
    setTimeout(releaseWakeLock,800);
  }catch(e){releaseWakeLock();}
}

function notifyRestDone(){
  try{
    if('Notification' in window&&Notification.permission==='granted'&&document.hidden){
      new Notification('TreinoLog',{body:'Descanso concluído! Hora da próxima série 💪'});
    }
  }catch(e){}
}

function showRestSplash(){
  const ex=document.getElementById('rest-splash');
  if(ex)ex.remove();
  const el=document.createElement('div');
  el.id='rest-splash';
  el.style.cssText='position:fixed;inset:0;z-index:1250;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:splashIn .2s ease forwards;';

    <div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);text-align:center;line-height:1.3;margin-bottom:10px">Descanso<br>concluído</div>
    <div style="font-size:15px;color:var(--accent);font-weight:500">Voltar ao treino</div>`;
  el.onclick=()=>el.remove();
  document.body.appendChild(el);
  setTimeout(()=>{if(el.parentNode)el.remove();},2000);
}

async function getCalCache(){
  if(calSessoesCache)return calSessoesCache;
  const sessoes=(await api.getSessoes()||[]).filter(s=>s.finalizado_em);
  const allTreinos=await api.getAllTreinos();
  const byDay={};
  sessoes.forEach(s=>{
    const k=dateKey(s.iniciado_em);
    if(!byDay[k])byDay[k]=[];
    const t=allTreinos.find(t=>t.id===s.treino_id);
    byDay[k].push({...s,treino_nome:t?.nome||'Treino'});
  });
  calSessoesCache={byDay,total:sessoes.length};
  return calSessoesCache;
}

async function renderCalendario(el){
  el.innerHTML=`<div class="loading"><div class="spinner"></div>Carregando...</div>`;
  const {byDay}=await getCalCache();
  const hoje=todayStr();
  const first=new Date(calAno,calMes,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(calAno,calMes+1,0).getDate();
  let cells='';
  DOW.forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-day empty-day"></div>`;
  let treinosNoMes=0;
  for(let d=1;d<=daysInMonth;d++){
    const k=`${calAno}-${String(calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const sess=byDay[k];
    const isHoje=k===hoje;
    if(sess)treinosNoMes++;
    cells+=`<div class="cal-day${sess?' treinado':''}${isHoje?' hoje':''}"${sess?` onclick="abrirDia('${k}')"`:''}>
      ${d}${sess?'<div class="cal-day-dot"></div>':''}
    </div>`;
  }
  // dias treinados na semana atual
  const now=new Date();
  const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);
  let semana=0;
  Object.keys(byDay).forEach(k=>{const d=new Date(k+'T12:00');if(d>=ws&&d<=now)semana++;});

  el.innerHTML=`
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <div class="cal-month-label">${MESES[calMes]} ${calAno}</div>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legenda">Toque em um dia treinado para ver os detalhes</div>
    <div class="cal-resumo">
      <div class="cal-resumo-item"><strong>${treinosNoMes}</strong><span>dias no mês</span></div>
      <div class="cal-resumo-item"><strong>${semana}</strong><span>esta semana</span></div>
    </div>`;
}

function calNav(dir){
  calMes+=dir;
  if(calMes<0){calMes=11;calAno--;}
  if(calMes>11){calMes=0;calAno++;}

}

let statsExSelecionado=null;
async function renderStats(el){
  el.innerHTML=`<div class="loading"><div class="spinner"></div>Calculando...</div>`;
  try{
    const sessoes=(await api.getSessoes()||[]).filter(s=>s.finalizado_em);
    const allTreinos=await api.getAllTreinos();
    const cargaRows=await api.getCargaHistory();
    // status rows: precisamos de todos sessao_exs p/ mais pulado
    const allExs=await sbFetch('treinos_sessao_exercicios?select=exercicio_id,nome_snapshot,status,carga_usada,sessao_id,treinos_sessoes(iniciado_em,finalizado_em)');
    const finExs=(allExs||[]).filter(r=>r.treinos_sessoes&&r.treinos_sessoes.finalizado_em);

    // métricas
    const agora=new Date();
    const mesAtual=sessoes.filter(s=>{const d=new Date(s.iniciado_em);return d.getMonth()===agora.getMonth()&&d.getFullYear()===agora.getFullYear();}).length;
    // frequência semanal média (últimas 8 semanas com base na 1ª sessão)
    let freqSemanal='–';
    if(sessoes.length){
      const dias=new Set(sessoes.map(s=>dateKey(s.iniciado_em)));
      const oldest=new Date(Math.min(...sessoes.map(s=>new Date(s.iniciado_em))));
      const semanas=Math.max(1,Math.ceil((agora-oldest)/(7*86400000)));
      freqSemanal=(dias.size/semanas).toFixed(1)+'x';
    }
    // streak de semanas consecutivas com >=1 treino
    let streak=0;
    if(sessoes.length){
      const weekKey=d=>{const dt=new Date(d);const ws=new Date(dt);ws.setDate(dt.getDate()-dt.getDay());return dateKey(ws.toISOString());};
      const weeks=new Set(sessoes.map(s=>weekKey(s.iniciado_em)));
      let cursor=new Date();
      while(true){
        const wk=weekKey(cursor.toISOString());
        if(weeks.has(wk)){streak++;cursor.setDate(cursor.getDate()-7);}
        else{
          if(streak===0){cursor.setDate(cursor.getDate()-7);const wk2=weekKey(cursor.toISOString());if(weeks.has(wk2)){continue;}}
          break;
        }
        if(streak>520)break;
      }
    }
    // tempo médio
    const durs=sessoes.filter(s=>s.duracao_segundos&&s.duracao_segundos<4*3600).map(s=>s.duracao_segundos);
    const tempoMedio=durs.length?formatDur(Math.round(durs.reduce((a,b)=>a+b,0)/durs.length)):'–';
    // mais pulado
    const puladosCount={};
    finExs.filter(r=>r.status==='pulei').forEach(r=>{puladosCount[r.nome_snapshot]=(puladosCount[r.nome_snapshot]||0)+1;});
    const maisPulado=Object.entries(puladosCount).sort((a,b)=>b[1]-a[1])[0];
    // dia preferido
    const dowCount={};
    sessoes.forEach(s=>{const d=new Date(s.iniciado_em).getDay();dowCount[d]=(dowCount[d]||0)+1;});
    const diaTop=Object.entries(dowCount).sort((a,b)=>b[1]-a[1])[0];

    // PRs por exercício
    const prs={};
    finExs.filter(r=>r.carga_usada&&r.status==='feito').forEach(r=>{
      const c=parseFloat(r.carga_usada);
      if(!prs[r.exercicio_id]||c>prs[r.exercicio_id].carga)prs[r.exercicio_id]={nome:r.nome_snapshot,carga:c};
    });
    const prList=Object.values(prs).sort((a,b)=>b.carga-a.carga);

    // exercícios p/ gráfico (com >=2 cargas)
    const chartData={};
    finExs.filter(r=>r.carga_usada&&r.status==='feito').forEach(r=>{
      if(!chartData[r.exercicio_id])chartData[r.exercicio_id]={nome:r.nome_snapshot,pontos:[]};
      chartData[r.exercicio_id].pontos.push({d:new Date(r.treinos_sessoes.iniciado_em),c:parseFloat(r.carga_usada)});
    });
    Object.values(chartData).forEach(cd=>cd.pontos.sort((a,b)=>a.d-b.d));
    const chartOpts=Object.entries(chartData).filter(([,v])=>v.pontos.length>=2);
    if(!statsExSelecionado&&chartOpts.length)statsExSelecionado=chartOpts[0][0];

    let html=`<div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${mesAtual}</div><div class="stat-label">Treinos este mês</div></div>
      <div class="stat-card"><div class="stat-val">${freqSemanal}</div><div class="stat-label">Frequência semanal média</div></div>
      <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-label">Semanas seguidas treinando</div></div>
      <div class="stat-card"><div class="stat-val">${tempoMedio}</div><div class="stat-label">Tempo médio de treino</div></div>
      <div class="stat-card"><div class="stat-val" style="font-size:15px;line-height:1.3">${maisPulado?maisPulado[0]:'–'}</div><div class="stat-label">Mais pulado${maisPulado?` (${maisPulado[1]}x)`:''}</div></div>
      <div class="stat-card"><div class="stat-val" style="font-size:17px">${diaTop?['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][diaTop[0]]:'–'}</div><div class="stat-label">Dia que mais treina</div></div>
    </div>`;

    html+=`<div class="stats-section-title">📈 Evolução de carga</div>
    <div class="chart-card">`;
    if(chartOpts.length){
      html+=`<select class="form-input" style="margin-bottom:14px" onchange="statsExSelecionado=this.value;render()">
        ${chartOpts.map(([id,v])=>`<option value="${id}"${id===statsExSelecionado?' selected':''}>${v.nome}</option>`).join('')}
      </select>
      ${buildChart(chartData[statsExSelecionado])}`;
    }else{
      html+=`<div class="chart-empty">Registre cargas em pelo menos 2 treinos do mesmo exercício para ver a evolução aqui.</div>`;
    }
    html+=`</div>`;

    html+=`<div class="stats-section-title">🏆 Recordes pessoais</div>`;
    if(prList.length){
      html+=prList.map(p=>`<div class="pr-item"><div class="pr-item-name">${p.nome}</div><div class="pr-item-val">${p.carga}kg</div></div>`).join('');
    }else{
      html+=`<div class="empty" style="padding:24px"><div class="empty-text">Registre cargas nos treinos para acumular recordes.</div></div>`;
    }
    el.innerHTML=html;
  }catch(e){
    el.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erro ao calcular estatísticas.<br><small>${e.message}</small></div></div>`;
  }
}

function buildChart(cd){
  if(!cd||cd.pontos.length<2)return '<div class="chart-empty">Sem dados suficientes.</div>';
  const W=320,H=160,P=28;
  const pts=cd.pontos;
  const cs=pts.map(p=>p.c);
  let min=Math.min(...cs),max=Math.max(...cs);
  if(min===max){min-=1;max+=1;}
  const pad=(max-min)*0.15;min-=pad;max+=pad;
  const x=i=>P+( (W-2*P) * (pts.length===1?0.5:i/(pts.length-1)) );
  const y=c=>H-P-((c-min)/(max-min))*(H-2*P);
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(p.c).toFixed(1)}`).join(' ');
  const dots=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.c).toFixed(1)}" r="4" fill="var(--accent)"/>`).join('');
  const labels=pts.map((p,i)=>{
    if(pts.length>6&&i!==0&&i!==pts.length-1&&i%Math.ceil(pts.length/4)!==0)return '';
    return `<text x="${x(i).toFixed(1)}" y="${(y(p.c)-9).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--text2)">${p.c}</text>`;
  }).join('');
  const d1=pts[0].d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  const d2=pts[pts.length-1].d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <path d="${line}" stroke="var(--accent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}${labels}
    <text x="${P}" y="${H-8}" font-size="10" fill="var(--text3)">${d1}</text>
    <text x="${W-P}" y="${H-8}" text-anchor="end" font-size="10" fill="var(--text3)">${d2}</text>
  </svg>
  <div style="font-size:12px;color:var(--text3);text-align:center;margin-top:8px">${pts.length} registros · ${pts[0].c}kg → ${pts[pts.length-1].c}kg</div>`;
}

// drag & drop de exercícios (handle, touch)
function setupExDrag(){
  document.querySelectorAll('.ger-ex-handle').forEach(handle=>{
    let item=null,clone=null,offY=0;
    handle.addEventListener('touchstart',e=>{
      item=handle.closest('.ger-ex-item');
      const r=item.getBoundingClientRect();
      offY=e.touches[0].clientY-r.top;
      clone=item.cloneNode(true);
      clone.style.cssText=`position:fixed;left:${r.left}px;width:${r.width}px;top:${r.top}px;z-index:1350;opacity:.9;pointer-events:none;background:var(--surface);border:1px solid var(--accent);border-radius:10px;`;
      document.body.appendChild(clone);
      item.classList.add('dragging');
    },{passive:true});
    handle.addEventListener('touchmove',e=>{
      if(!clone)return;
      e.preventDefault();
      clone.style.top=(e.touches[0].clientY-offY)+'px';
      const list=item.parentElement;
      list.querySelectorAll('.ger-ex-item').forEach(i=>i.classList.remove('drag-over'));
      const over=[...list.querySelectorAll('.ger-ex-item:not(.dragging)')].find(i=>{const r=i.getBoundingClientRect();return e.touches[0].clientY>r.top&&e.touches[0].clientY<r.bottom;});
      if(over)over.classList.add('drag-over');
    },{passive:false});
    handle.addEventListener('touchend',async()=>{
      if(!clone)return;
      clone.remove();clone=null;
      item.classList.remove('dragging');
      const list=item.parentElement;
      const over=list.querySelector('.ger-ex-item.drag-over');
      list.querySelectorAll('.ger-ex-item').forEach(i=>i.classList.remove('drag-over'));
      if(over&&over!==item){
        const r=over.getBoundingClientRect();
        list.insertBefore(item,over);
        // Persistir nova ordem
        const ids=[...list.querySelectorAll('.ger-ex-item')].map(i=>i.dataset.exid);
        try{
          await Promise.all(ids.map((id,i)=>api.updateExercicio(id,{posicao:i})));
          showToast('Ordem salva!','success');
        }catch{showToast('Erro ao salvar ordem.','error');}
      }
      item=null;
    });
  });
}

    <div class="tut-section-title">👆 Gestos nos Exercícios</div>
    <div class="tut-text">➡️ Arraste para a <span class="tut-green">direita</span>: marcar <strong>Feito</strong>.</div>
    <div class="tut-text">⬅️ Arraste para a <span class="tut-orange">esquerda</span>: <strong>Pular</strong> hoje.</div>
    <div class="tut-text">O botão de status no card também alterna: Feito → Pulei → Não marcado. Os botões <strong>+/−</strong> ajustam séries manualmente.</div>
  </div>

  <div class="tut-section">
    <div class="tut-section-title">📅 Calendário</div>
    <div class="tut-text">A aba Calendário mostra o mês com os <strong>dias treinados destacados</strong>. Navegue entre meses com ‹ ›.</div>
    <div class="tut-text"><strong>Toque em um dia treinado</strong> para ver os detalhes completos: treino, horários, exercícios, séries e cargas — e ali mesmo você pode <strong>✏️ Editar</strong> ou <strong>🗑 Excluir</strong> o registro.</div>
  </div>

  <div class="tut-section">
    <div class="tut-section-title">📊 Stats</div>
    <div class="tut-text">A aba Stats reúne: treinos no mês, frequência semanal média, <strong>sequência de semanas treinando</strong>, tempo médio, exercício mais pulado e seu dia preferido.</div>
    <div class="tut-text">O <strong>gráfico de evolução de carga</strong> mostra sua progressão em qualquer exercício ao longo do tempo — selecione no menu.</div>
    <div class="tut-text">Logo abaixo, a lista de <strong>🏆 recordes pessoais</strong>: a maior carga registrada em cada exercício.</div>
  </div>

  <div class="tut-section">
    <div class="tut-section-title">⚙️ Gerenciar</div>
    <div class="tut-step"><div class="tut-step-num">1</div><div class="tut-step-text"><strong>Grupos</strong> — guarda-chuva dos treinos. Apenas um ativo por vez.</div></div>
    <div class="tut-step"><div class="tut-step-num">2</div><div class="tut-step-text"><strong>Treinos</strong> — dentro de cada grupo. Use o + do grupo para adicionar.</div></div>
    <div class="tut-step"><div class="tut-step-num">3</div><div class="tut-step-text"><strong>Exercícios</strong> — listados sob cada treino, com editar/excluir. <strong>Arraste pelo ⠿</strong> para reordenar — a ordem reflete na sessão.</div></div>
  </div>

  <div class="tut-section">
    <div class="tut-section-title">🎨 Aparência e Acesso</div>

    <div class="tut-text">O app pede um <strong>PIN de 4 dígitos</strong> ao abrir. Dados ficam na nuvem: troque de aparelho sem perder nada.</div>
    <div class="tut-text">Adicione à Tela de Início pelo menu de compartilhar do navegador para usar como app, com ícone próprio.</div>

  <button class="btn-primary" onclick="hideOverlayScreen()" style="margin-top:4px">Entendi! Voltar ao app</button>
  <div style="height:20px"></div>`;
}

// ===================== UTILS =====================
function formatDur(s){const m=Math.floor(Math.abs(s)/60),sec=Math.abs(s)%60;return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),2500);}

// Bloqueio de zoom (sem afetar botões/inputs — fix do PIN lento)
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
let lastTap=0;
document.addEventListener('touchend',e=>{
  if(e.target.closest('button,input,select,textarea,.pin-key'))return;
  const now=Date.now();
  if(now-lastTap<300)e.preventDefault();
  lastTap=now;
},{passive:false});
</script>
